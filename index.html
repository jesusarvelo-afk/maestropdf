<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyect PDF</title>
    
    <!-- Favicon AJJ -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='32' height='32'%3E%3Crect width='24' height='24' rx='4' fill='%232563eb'/%3E%3Ctext x='12' y='17' font-family='sans-serif' font-size='9' font-weight='bold' fill='white' text-anchor='middle'%3EAJJ%3C/text%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- PDF-Lib para procesamiento de PDFs (Unir, Crear, Dividir) -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    
    <!-- PDF.js para renderizado (Compresión) y extracción de texto -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <!-- JSZip para empaquetar en ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Fuente Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin 2s linear infinite; }
        
        body, nav, .tool-card, #dropzone {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Animaciones para Toasts y Modales */
        .toast-enter { animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-900 flex flex-col font-sans text-slate-900 dark:text-slate-100 selection:bg-blue-200 dark:selection:bg-blue-900 transition-colors duration-300">

    <div id="app" class="flex flex-col flex-grow"></div>
    <div id="toast-container" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2"></div>

    <script>
        // CONFIGURACIÓN DE URLS Y LÍMITES
        const URL_SUGERENCIAS = "https://script.google.com/macros/s/AKfycbxw6LThSnaQDdSedR-CD5XmT_6PB_vynTqQB7sIGy5frIKobXaE-TL4IAkPCzqpH_WL/exec";
        const MAX_FILE_SIZE = 101 * 1024 * 1024; // 101 MB

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        const TOOLS = [
            {
                id: 'merge',
                title: 'Unir PDF',
                description: 'Une varios archivos (PDF o Imágenes) en un solo documento PDF.',
                icon: 'layers',
                iconColor: 'text-blue-500 dark:text-blue-400',
                color: 'hover:border-blue-500 dark:hover:border-blue-400 hover:shadow-blue-100 dark:hover:shadow-blue-900/20',
                accept: '.pdf, image/png, image/jpeg',
                multiple: true
            },
            {
                id: 'split',
                title: 'Dividir PDF',
                description: 'Extrae páginas específicas de tu documento PDF.',
                icon: 'scissors',
                iconColor: 'text-orange-500 dark:text-orange-400',
                color: 'hover:border-orange-500 dark:hover:border-orange-400 hover:shadow-orange-100 dark:hover:shadow-orange-900/20',
                accept: '.pdf',
                multiple: false
            },
            {
                id: 'compress',
                title: 'Comprimir PDF',
                description: 'Reduce el tamaño de tu PDF optimizando sus imágenes internas.',
                icon: 'minimize-2',
                iconColor: 'text-green-500 dark:text-green-400',
                color: 'hover:border-green-500 dark:hover:border-green-400 hover:shadow-green-100 dark:hover:shadow-green-900/20',
                accept: '.pdf',
                multiple: false
            },
            {
                id: 'to-pdf',
                title: 'Crear PDF',
                description: 'Crea archivos PDF a partir de textos (.txt) o imágenes.',
                icon: 'file-plus-2',
                iconColor: 'text-purple-500 dark:text-purple-400',
                color: 'hover:border-purple-500 dark:hover:border-purple-400 hover:shadow-purple-100 dark:hover:shadow-purple-900/20',
                accept: '.txt,.doc,.docx,.xls,.xlsx,.jpg,.png',
                multiple: true
            },
            {
                id: 'from-pdf',
                title: 'PDF a Word / Excel / JPG',
                description: 'Convierte tus archivos PDF a formatos editables o imágenes.',
                icon: 'arrow-right-left',
                iconColor: 'text-red-500 dark:text-red-400',
                color: 'hover:border-red-500 dark:hover:border-red-400 hover:shadow-red-100 dark:hover:shadow-red-900/20',
                accept: '.pdf',
                multiple: false
            }
        ];

        let state = {
            activeTool: null,
            files: [],
            isDragging: false,
            processingState: 'idle', 
            errorMessage: '',
            downloadUrl: null,
            downloadName: '',
            selectedExportFormat: 'docx',
            splitRange: '', 
            compressionLevel: '50',
            isTermsModalOpen: false,
            isSugModalOpen: false,
            subscriptionStatus: 'idle', 
            subscriptionEmail: '',
            sugStatus: 'idle'
        };

        function render() {
            const app = document.getElementById('app');
            const isDark = document.documentElement.classList.contains('dark');
            let html = '';

            // Navbar con Botón de Donaciones Ko-Fi
            html += `
                <nav class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-10 shadow-sm transition-colors duration-300">
                    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                        <div class="flex items-center gap-2 cursor-pointer" id="nav-logo">
                            <i data-lucide="file-text" class="w-8 h-8 text-blue-600 dark:text-blue-500 pointer-events-none"></i>
                            <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white pointer-events-none">Proyect PDF</span>
                        </div>
                        
                        <div class="flex items-center gap-3">
                            ${state.activeTool ? `
                            <button id="back-btn" class="hidden sm:flex items-center gap-2 text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors relative z-20">
                                <i data-lucide="arrow-left" class="w-4 h-4 pointer-events-none"></i> Volver al inicio
                            </button>
                            ` : ''}
                            
                            <a href="https://ko-fi.com/jesusarvelo/tip" target="_blank" class="flex items-center gap-2 px-4 py-2 bg-[#FF5E5B] hover:bg-[#ff4542] text-white font-bold rounded-full transition-all shadow-sm text-sm">
                                Donaciones <i data-lucide="coffee" class="w-4 h-4 pointer-events-none"></i>
                            </a>

                            <button id="theme-toggle" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors relative z-20" aria-label="Cambiar tema">
                                <i data-lucide="${isDark ? 'sun' : 'moon'}" class="w-5 h-5 pointer-events-none"></i>
                            </button>
                        </div>
                    </div>
                </nav>
            `;

            // Main Content
            html += '<main class="flex-grow flex flex-col">';
            if (!state.activeTool) {
                html += renderHome();
            } else {
                html += renderWorkspace();
            }
            html += '</main>';

            // Footer con la nueva distribución
            html += `
                <footer class="border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 mt-auto transition-colors duration-300">
                    <div class="max-w-6xl mx-auto px-4 py-6 flex flex-col md:flex-row items-center justify-between text-center md:text-left gap-4">
                        
                        <!-- Izquierda: Firma y Versión -->
                        <div class="text-slate-600 dark:text-slate-400 font-medium flex items-center justify-center md:justify-start gap-2">
                            <span class="flex items-center gap-1.5">
                                <img src="https://flagcdn.com/w20/ve.png" srcset="https://flagcdn.com/w40/ve.png 2x" alt="Venezuela" class="w-4 h-3 rounded-[2px] shadow-sm pointer-events-none">
                                Desarrollado por Jesús Arvelo & G-AI
                            </span>
                            <span class="text-xs font-bold tracking-widest bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded-md">(V. 1.0.1)</span>
                        </div>
                        
                        <!-- Derecha: Copyright y Términos -->
                        <div class="text-sm text-slate-500 dark:text-slate-400 flex flex-col md:flex-row items-center gap-2 md:gap-4">
                            <span>© 2026 Todos los derechos reservados.</span>
                            <button id="open-terms-btn" class="text-blue-600 dark:text-blue-400 hover:underline hover:text-blue-800 dark:hover:text-blue-300 transition-colors">
                                Términos y Condiciones de Uso
                            </button>
                        </div>
                        
                    </div>
                </footer>
            `;

            // Botón Flotante de Sugerencias
            html += `
                <button id="open-sug-btn" class="fixed bottom-6 right-6 bg-slate-900 dark:bg-blue-600 text-white p-4 rounded-full shadow-lg hover:scale-105 transition-all duration-300 z-40 flex items-center gap-2 group">
                    <i data-lucide="message-square" class="w-6 h-6 pointer-events-none"></i>
                    <span class="max-w-0 overflow-hidden whitespace-nowrap group-hover:max-w-xs transition-all duration-300 ease-in-out font-medium pointer-events-none">
                        &nbsp;Sugerencias
                    </span>
                </button>
            `;

            // Modales
            if (state.isTermsModalOpen) html += renderTermsModal();
            if (state.isSugModalOpen) html += renderSuggestionsModal();

            app.innerHTML = html;
            lucide.createIcons();
            attachListeners();
        }

        // --- RENDER HOME ---
        function renderHome() {
            let cardsHtml = TOOLS.map(tool => `
                <div data-id="${tool.id}" class="tool-card flex flex-col h-full bg-white dark:bg-slate-800 p-6 rounded-2xl border-2 border-slate-100 dark:border-slate-700 cursor-pointer transition-all duration-200 shadow-sm hover:-translate-y-1 ${tool.color}">
                    <div class="bg-slate-50 dark:bg-slate-900/50 w-16 h-16 rounded-xl flex items-center justify-center mb-4 transition-colors">
                        <i data-lucide="${tool.icon}" class="w-8 h-8 ${tool.iconColor}"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 dark:text-white mb-2 transition-colors">${tool.title}</h3>
                    <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed transition-colors flex-grow">${tool.description}</p>
                </div>
            `).join('');

            return `
                <div class="max-w-6xl mx-auto px-4 py-12 flex-grow">
                    <div class="text-center mb-16">
                        <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 dark:text-white tracking-tight mb-4 transition-colors">
                            Proyect <span class="text-blue-600 dark:text-blue-500">PDF</span>
                        </h1>
                        <!-- TEXTO DE PRIVACIDAD FLUORESCENTE -->
                        <div class="inline-block border border-green-500 rounded-xl px-4 py-2 bg-green-50 dark:bg-slate-800 text-green-700 dark:text-[#39ff14] font-bold shadow-sm dark:shadow-[#39ff14]/20 mb-6">
                            <i data-lucide="lock" class="inline w-4 h-4 mr-1 pb-0.5 pointer-events-none"></i> Privacidad Absoluta: Tus archivos nunca salen de tu ordenador
                        </div>
                        <p class="text-lg text-slate-600 dark:text-slate-400 max-w-2xl mx-auto transition-colors mt-2">
                            Todas las herramientas que necesitas para trabajar con archivos PDF en un solo lugar. 
                            Rápido, seguro y fácil de usar directamente en tu navegador.
                        </p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 items-stretch">
                        ${cardsHtml}
                    </div>
                </div>
            `;
        }

        // --- RENDER WORKSPACE ---
        function renderWorkspace() {
            const tool = state.activeTool;
            let workspaceContent = '';

            if (state.processingState === 'idle') {
                workspaceContent = `
                    <div class="p-8">
                        <div id="dropzone" class="border-2 border-dashed rounded-2xl p-12 text-center transition-all duration-200 
                            ${state.isDragging ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/20' : 'border-slate-300 dark:border-slate-600 hover:border-slate-400 dark:hover:border-slate-500 bg-slate-50 dark:bg-slate-800/50'}">
                            
                            <input type="file" id="file-input" class="hidden" accept="${tool.accept}" ${tool.multiple ? 'multiple' : ''} />
                            
                            <div class="flex justify-center mb-4">
                                <i data-lucide="upload-cloud" class="w-16 h-16 ${state.isDragging ? 'text-blue-500' : 'text-slate-400 dark:text-slate-500'}"></i>
                            </div>
                            <h3 class="text-xl font-semibold text-slate-700 dark:text-slate-200 mb-2 transition-colors">Arrastra tus archivos aquí</h3>
                            <p class="text-slate-500 dark:text-slate-400 mb-6 transition-colors">o haz clic para seleccionar de tu dispositivo</p>
                            
                            <button id="select-files-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-xl transition-colors shadow-sm">
                                Seleccionar Archivos
                            </button>
                            <p class="text-xs text-slate-400 dark:text-slate-500 mt-4 transition-colors">Límite de seguridad: 101 MB por archivo</p>
                        </div>

                        ${state.files.length > 0 ? `
                        <div class="mt-8">
                            <h4 class="font-semibold text-slate-700 dark:text-slate-300 mb-4 transition-colors">Archivos listos para procesar:</h4>
                            <ul class="space-y-3 mb-6">
                                ${state.files.map((file, idx) => `
                                <li class="flex items-center justify-between bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border border-slate-100 dark:border-slate-700 transition-colors">
                                    <div class="flex items-center gap-3 overflow-hidden">
                                        <i data-lucide="file-text" class="w-5 h-5 text-slate-400 dark:text-slate-500 flex-shrink-0"></i>
                                        <span class="font-medium text-slate-700 dark:text-slate-200 truncate transition-colors">${file.name}</span>
                                        <span class="text-xs text-slate-400 dark:text-slate-500 ml-2 transition-colors">(${(file.size / 1024 / 1024).toFixed(2)} MB)</span>
                                    </div>
                                    <button data-index="${idx}" class="remove-file-btn text-slate-400 dark:text-slate-500 hover:text-red-500 dark:hover:text-red-400 transition-colors p-1 z-20 relative">
                                        <i data-lucide="x" class="w-5 h-5 pointer-events-none"></i>
                                    </button>
                                </li>
                                `).join('')}
                            </ul>

                            ${tool.id === 'from-pdf' ? `
                            <div class="mt-6 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Convertir a:</label>
                                <select id="export-format" class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 transition-colors">
                                    <option value="docx" ${state.selectedExportFormat === 'docx' ? 'selected' : ''}>Microsoft Word (.docx)</option>
                                    <option value="xlsx" ${state.selectedExportFormat === 'xlsx' ? 'selected' : ''}>Microsoft Excel (.xlsx)</option>
                                    <option value="jpg" ${state.selectedExportFormat === 'jpg' ? 'selected' : ''}>Imagen JPEG (.jpg)</option>
                                    <option value="png" ${state.selectedExportFormat === 'png' ? 'selected' : ''}>Imagen PNG (.png)</option>
                                </select>
                            </div>
                            ` : ''}

                            ${tool.id === 'split' ? `
                            <div class="mt-6 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Rango de páginas a extraer (ej. 1, 3, 5-8):</label>
                                <input type="text" id="split-range" value="${state.splitRange}" placeholder="Ej: 1, 3, 5-8" class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 transition-colors">
                                <p class="text-xs text-slate-500 mt-2">Si extraes varias páginas, se descargarán ordenadas independientemente en un archivo .ZIP</p>
                            </div>
                            ` : ''}
                            
                            ${tool.id === 'compress' ? `
                            <div class="mt-6 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Nivel de compresión:</label>
                                <select id="compression-level" class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 transition-colors">
                                    <option value="25" ${state.compressionLevel === '25' ? 'selected' : ''}>25% - Calidad Excelente (Menos compresión)</option>
                                    <option value="50" ${state.compressionLevel === '50' ? 'selected' : ''}>50% - Calidad Media (Equilibrio ideal)</option>
                                    <option value="75" ${state.compressionLevel === '75' ? 'selected' : ''}>75% - Calidad Básica (Mayor compresión)</option>
                                </select>
                            </div>
                            ` : ''}

                            <div class="mt-6 flex justify-end border-t border-slate-100 dark:border-slate-700 pt-6 transition-colors">
                                <button id="process-btn" class="bg-slate-900 dark:bg-blue-600 hover:bg-slate-800 dark:hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl flex items-center gap-2 transition-colors shadow-md">
                                    Procesar Ahora <i data-lucide="arrow-right-left" class="w-5 h-5 pointer-events-none"></i>
                                </button>
                            </div>
                        </div>
                        ` : ''}
                    </div>
                `;
            } else if (state.processingState === 'processing') {
                workspaceContent = `
                    <div class="p-20 text-center flex flex-col items-center justify-center">
                        <i data-lucide="loader-2" class="w-16 h-16 text-blue-600 dark:text-blue-500 animate-spin-slow mb-6"></i>
                        <h3 class="text-2xl font-bold text-slate-800 dark:text-white mb-2 transition-colors">Procesando tus archivos...</h3>
                        <p class="text-slate-500 dark:text-slate-400 transition-colors">Esto puede tomar unos segundos, por favor no cierres la ventana.</p>
                    </div>
                `;
            } else if (state.processingState === 'done') {
                workspaceContent = `
                    <div class="p-16 text-center">
                        <div class="w-20 h-20 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-6 transition-colors">
                            <i data-lucide="check-circle-2" class="w-10 h-10 text-green-600 dark:text-green-500"></i>
                        </div>
                        <h3 class="text-3xl font-bold text-slate-800 dark:text-white mb-4 transition-colors">¡Tarea Completada!</h3>
                        <p class="text-slate-600 dark:text-slate-400 mb-8 max-w-md mx-auto transition-colors">Tus archivos han sido procesados exitosamente y están listos para ser descargados.</p>
                        
                        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                            <a href="${state.downloadUrl}" download="${state.downloadName}" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-xl flex items-center gap-2 transition-all shadow-md hover:shadow-lg w-full sm:w-auto justify-center">
                                <i data-lucide="download" class="w-5 h-5 pointer-events-none"></i> Descargar Archivo
                            </a>
                            <button id="reset-btn" class="bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 hover:border-slate-300 dark:hover:border-slate-600 text-slate-700 dark:text-slate-300 font-bold py-4 px-8 rounded-xl transition-all w-full sm:w-auto">
                                Hacer otra tarea
                            </button>
                        </div>
                    </div>
                `;
            } else if (state.processingState === 'error') {
                workspaceContent = `
                    <div class="p-16 text-center">
                        <div class="w-20 h-20 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center mx-auto mb-6 transition-colors">
                            <i data-lucide="alert-circle" class="w-10 h-10 text-red-600 dark:text-red-500"></i>
                        </div>
                        <h3 class="text-2xl font-bold text-slate-800 dark:text-white mb-4 transition-colors">Ocurrió un problema</h3>
                        <p class="text-red-500 dark:text-red-400 mb-8 max-w-md mx-auto bg-red-50 dark:bg-red-900/20 p-4 rounded-lg border border-red-100 dark:border-red-800 transition-colors break-words">
                            ${state.errorMessage}
                        </p>
                        <button id="reset-btn-err" class="bg-slate-900 dark:bg-slate-700 hover:bg-slate-800 dark:hover:bg-slate-600 text-white font-bold py-3 px-8 rounded-xl transition-colors">
                            Intentar nuevamente
                        </button>
                    </div>
                `;
            }

            return `
                <div class="max-w-4xl mx-auto px-4 py-12 flex-grow">
                    <div class="text-center mb-10">
                        <div class="flex justify-center mb-4">
                            <i data-lucide="${tool.icon}" class="w-12 h-12 ${tool.iconColor}"></i>
                        </div>
                        <h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-2 transition-colors">${tool.title}</h2>
                        <p class="text-slate-600 font-medium dark:text-slate-400 transition-colors">${tool.description}</p>
                    </div>
                    <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden transition-colors duration-300">
                        ${workspaceContent}
                    </div>
                </div>
            `;
        }

        // --- MODALES (TÉRMINOS Y SUGERENCIAS) ---
        function renderTermsModal() {
            return `
                <div id="terms-modal-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-3xl max-h-[85vh] flex flex-col overflow-hidden border border-slate-200 dark:border-slate-700">
                        <div class="px-6 py-4 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between bg-slate-50 dark:bg-slate-800/50">
                            <h2 class="text-xl font-bold text-slate-800 dark:text-white flex items-center gap-2">
                                <i data-lucide="shield-check" class="w-6 h-6 text-blue-600 dark:text-blue-500"></i>
                                Términos y Condiciones de Uso

                            <section><h4 class="text-lg font-bold mb-2 text-slate-800 dark:text-white">3. Privacidad y Tratamiento de Archivos</h4><p class="mb-3">Sabemos lo importante que es la privacidad de tu información.</p><ul class="list-disc pl-5 space-y-2"><li><strong class="text-slate-700 dark:text-slate-200">Procesamiento temporal:</strong> Los documentos, fotografías y archivos que subas para comprimir, crear o convertir se procesan de manera temporal y estrictamente para cumplir con la tarea solicitada.</li><li><strong class="text-slate-700 dark:text-slate-200">Cero almacenamiento:</strong> No guardamos, leemos, compartimos, cedemos, ni nos apropiamos del contenido de ninguno de los archivos que proceses en esta plataforma.</li></ul></section>

                            <section><h4 class="text-lg font-bold mb-2 text-slate-800 dark:text-white">5. Limitación de Responsabilidad</h4><p>La herramienta se ofrece "tal cual", como un proyecto de desarrollo continuo, y que es creado de manera recreacional pero de igual forma tiene protección intelectual. No nos hacemos responsables por la pérdida accidental de datos, corrupción de archivos o el uso indebido que los usuarios le den a los documentos procesados. Recomendamos encarecidamente mantener siempre una copia de seguridad (backup) de tus archivos originales.</p></section>
                            <section><h4 class="text-lg font-bold mb-2 text-slate-800 dark:text-white">6. Legislación Aplicable</h4><p>Estos términos y condiciones se rigen e interpretan de acuerdo con las leyes de la República Bolivariana de Venezuela.</p></section>

                        <div class="px-6 py-4 border-t border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50 flex justify-end">
                            <button id="close-terms-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-lg shadow-sm">Entendido y Aceptado</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSuggestionsModal() {
            return `
                <div id="sug-modal-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
                        <div class="p-5 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50">
                            <h3 class="text-xl font-bold flex items-center gap-2 text-slate-800 dark:text-white"><i data-lucide="message-square" class="text-blue-600"></i> Buzón de Contacto</h3>
                            <button id="close-sug-x" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"><i data-lucide="x" class="pointer-events-none"></i></button>
                        </div>
                        <div class="p-6">
                            ${state.sugStatus === 'success' ? `
                                <div class="text-center py-8">
                                    <i data-lucide="check-circle-2" class="w-16 h-16 text-green-500 mx-auto mb-4"></i>
                                    <h4 class="text-lg font-bold text-slate-800 dark:text-white mb-2">¡Mensaje enviado!</h4>
                                    <p class="text-slate-500">Gracias por ayudarnos a mejorar.</p>
                                </div>
                            ` : `
                                <form id="sug-form">
                                    <p class="text-sm text-slate-600 dark:text-slate-300 mb-4">¿Encontraste un error? ¿Tienes una idea genial? Escríbela aquí y le llegará directamente al desarrollador.</p>
                                    <textarea id="sug-msg" required placeholder="Escribe tu idea aquí..." class="w-full border-2 border-slate-200 dark:border-slate-600 rounded-xl p-3 focus:border-blue-500 bg-transparent outline-none min-h-[120px] resize-none dark:text-white mb-4"></textarea>
                                    <input id="sug-email" type="email" placeholder="Tu Correo (Opcional)" class="w-full border-2 border-slate-200 dark:border-slate-600 rounded-xl p-3 focus:border-blue-500 bg-transparent outline-none dark:text-white mb-6">
                                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-colors">
                                        ${state.sugStatus === 'sending' ? 'Enviando...' : '<i data-lucide="send" class="w-5 h-5 pointer-events-none"></i> Enviar Mensaje'}
                                    </button>
                                </form>
                            `}
                        </div>
                    </div>
                </div>
            `;
        }

        // --- CONTROLADORES DE EVENTOS GLOBALES ---
        function attachListeners() {
            // Theme Toggle
            const themeToggleBtn = document.getElementById('theme-toggle');
            if (themeToggleBtn) {
                themeToggleBtn.addEventListener('click', () => {
                    try {
                        const htmlElement = document.documentElement;
                        if (htmlElement.classList.contains('dark')) {
                            htmlElement.classList.remove('dark');
                            localStorage.setItem('theme', 'light');
                        } else {
                            htmlElement.classList.add('dark');
                            localStorage.setItem('theme', 'dark');
                        }
                    } catch(e) {}
                    render(); 
                });
            }

            // Navigation
            const navLogo = document.getElementById('nav-logo');
            if (navLogo) navLogo.onclick = () => { state.activeTool = null; resetWorkspace(); };
            
            const backBtn = document.getElementById('back-btn');
            if (backBtn) backBtn.onclick = () => { state.activeTool = null; resetWorkspace(); };

            // Modal Términos
            const openTermsBtn = document.getElementById('open-terms-btn');
            if (openTermsBtn) {
                openTermsBtn.onclick = () => { state.isTermsModalOpen = true; render(); document.body.style.overflow = 'hidden'; };
            }
            const closeTermsModal = () => { state.isTermsModalOpen = false; render(); document.body.style.overflow = 'auto'; };
            const closeTermsBtn = document.getElementById('close-terms-btn');
            const closeTermsX = document.getElementById('close-terms-x');
            const termsOverlay = document.getElementById('terms-modal-overlay');
            if (closeTermsBtn) closeTermsBtn.onclick = closeTermsModal;
            if (closeTermsX) closeTermsX.onclick = closeTermsModal;
            if (termsOverlay) termsOverlay.onclick = (e) => { if (e.target === termsOverlay) closeTermsModal(); };

            // Modal Sugerencias
            const openSugBtn = document.getElementById('open-sug-btn');
            if (openSugBtn) {
                openSugBtn.onclick = () => { state.isSugModalOpen = true; state.sugStatus = 'idle'; render(); document.body.style.overflow = 'hidden'; };
            }
            const closeSugModal = () => { state.isSugModalOpen = false; render(); document.body.style.overflow = 'auto'; };
            const closeSugX = document.getElementById('close-sug-x');
            const sugOverlay = document.getElementById('sug-modal-overlay');
            if (closeSugX) closeSugX.onclick = closeSugModal;
            if (sugOverlay) sugOverlay.onclick = (e) => { if (e.target === sugOverlay) closeSugModal(); };

            // Sugerencias Form
            const sugForm = document.getElementById('sug-form');
            if (sugForm) {
                sugForm.onsubmit = (e) => {
                    e.preventDefault();
                    const msg = document.getElementById('sug-msg').value;
                    const email = document.getElementById('sug-email').value;
                    if (!msg) return;
                    
                    state.sugStatus = 'sending';
                    render();

                    fetch(URL_SUGERENCIAS, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams({ mensaje: msg, correo: email })
                    }).then(() => {
                        state.sugStatus = 'success';
                        render();
                        setTimeout(closeSugModal, 3000);
                    }).catch(() => {
                        showToast('Error al enviar. Intente luego.');
                        state.sugStatus = 'idle';
                        render();
                    });
                };
            }

            // Tools Navigation
            if (!state.activeTool) {
                document.querySelectorAll('.tool-card').forEach(card => {
                    card.onclick = () => {
                        const toolId = card.getAttribute('data-id');
                        state.activeTool = TOOLS.find(t => t.id === toolId);
                        resetWorkspace();
                    };
                });
            } else {
                // Workspace events
                const dropzone = document.getElementById('dropzone');
                const fileInput = document.getElementById('file-input');
                const selectFilesBtn = document.getElementById('select-files-btn');
                const processBtn = document.getElementById('process-btn');
                const resetBtn = document.getElementById('reset-btn');
                const resetBtnErr = document.getElementById('reset-btn-err');

                if (dropzone) {
                    dropzone.ondragover = (e) => { e.preventDefault(); state.isDragging = true; render(); };
                    dropzone.ondragleave = (e) => { e.preventDefault(); state.isDragging = false; render(); };
                    dropzone.ondrop = (e) => {
                        e.preventDefault();
                        state.isDragging = false;
                        if (e.dataTransfer.files.length > 0) handleFiles(Array.from(e.dataTransfer.files));
                    };
                }

                if (selectFilesBtn && fileInput) {
                    selectFilesBtn.onclick = () => fileInput.click();
                    fileInput.onchange = (e) => {
                        if (e.target.files.length > 0) handleFiles(Array.from(e.target.files));
                    };
                }

                const formatSelect = document.getElementById('export-format');
                if (formatSelect) formatSelect.onchange = (e) => { state.selectedExportFormat = e.target.value; };

                const splitRangeInput = document.getElementById('split-range');
                if (splitRangeInput) splitRangeInput.oninput = (e) => { state.splitRange = e.target.value; };

                const compressionSelect = document.getElementById('compression-level');
                if (compressionSelect) compressionSelect.onchange = (e) => { state.compressionLevel = e.target.value; };

                if (processBtn) processBtn.onclick = processFiles;
                if (resetBtn) resetBtn.onclick = resetWorkspace;
                if (resetBtnErr) resetBtnErr.onclick = resetWorkspace;

                document.querySelectorAll('.remove-file-btn').forEach(btn => {
                    btn.onclick = (e) => {
                        const index = parseInt(e.currentTarget.getAttribute('data-index'));
                        state.files.splice(index, 1);
                        render();
                    };
                });
            }
        }

        // --- UTILIDADES ---
        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-2xl text-white text-sm font-medium flex items-center gap-3 toast-enter bg-slate-800 dark:bg-slate-700 border-l-4 border-blue-500`;
            toast.innerHTML = `<span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function handleFiles(newFiles) {
            for (let f of newFiles) {
                if (f.size > MAX_FILE_SIZE) {
                    showToast(`Archivo omitido: ${f.name}. Límite 101 MB.`);
                    continue;
                }
                if (state.activeTool.multiple) {
                    state.files.push(f);
                } else {
                    state.files = [f];
                }
            }
            render();
        }

        function resetWorkspace() {
            state.files = [];
            state.processingState = 'idle';
            state.downloadUrl = null;
            state.downloadName = '';
            state.errorMessage = '';
            render();
        }

        function createDownload(data, filename, type) {
            let blob = new Blob([data], { type: type });
            state.downloadUrl = URL.createObjectURL(blob);
            state.downloadName = filename;
            state.processingState = 'done';
            render();
        }

        function parsePageRange(rangeStr, maxPages) {
            const indices = new Set();
            if (!rangeStr.trim()) return [0];
            const parts = rangeStr.split(',');
            for (let part of parts) {
                part = part.trim();
                if (part.includes('-')) {
                    const [startStr, endStr] = part.split('-');
                    let start = parseInt(startStr), end = parseInt(endStr);
                    if (!isNaN(start) && !isNaN(end)) {
                        for (let i = Math.max(1, start); i <= Math.min(maxPages, end); i++) indices.add(i - 1);
                    }
                } else {
                    const num = parseInt(part);
                    if (!isNaN(num) && num >= 1 && num <= maxPages) indices.add(num - 1);
                }
            }
            return Array.from(indices).sort((a, b) => a - b);
        }

        // --- MOTORES DE PROCESAMIENTO ---
        async function processFiles() {
            if (state.files.length === 0) return;
            state.processingState = 'processing';
            render();

            try {
                if (state.activeTool.id === 'merge') await processMerge();
                else if (state.activeTool.id === 'split') await processSplit();
                else if (state.activeTool.id === 'compress') await processCompress();
                else if (state.activeTool.id === 'to-pdf') await processCreatePdf();
                else if (state.activeTool.id === 'from-pdf') await processFromPdf();
            } catch (error) {
                state.errorMessage = 'Ocurrió un error. Verifique que el archivo sea válido y no esté protegido.';
                state.processingState = 'error';
                render();
            }
        }

        async function processMerge() {
            const { PDFDocument } = window.PDFLib;
            const mergedPdf = await PDFDocument.create();
            for (const file of state.files) {
                const arrayBuffer = await file.arrayBuffer();
                if (file.name.toLowerCase().endsWith('.pdf')) {
                    const pdf = await PDFDocument.load(arrayBuffer);
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    copiedPages.forEach((page) => mergedPdf.addPage(page));
                } else if (file.type.startsWith('image/')) {
                    let image = file.name.toLowerCase().endsWith('.png') ? await mergedPdf.embedPng(arrayBuffer) : await mergedPdf.embedJpg(arrayBuffer);
                    if (image) {
                        const page = mergedPdf.addPage([image.width, image.height]);
                        page.drawImage(image, { x: 0, y: 0, width: image.width, height: image.height });
                    }
                }
            }
            createDownload(await mergedPdf.save(), 'Archivos_Unidos.pdf', 'application/pdf');
        }

        async function processSplit() {
            const { PDFDocument } = window.PDFLib;
            const arrayBuffer = await state.files[0].arrayBuffer();
            const originalPdf = await PDFDocument.load(arrayBuffer);
            const pagesToExtract = parsePageRange(state.splitRange, originalPdf.getPageCount());
            
            if (pagesToExtract.length === 0) throw new Error("Rango inválido");

            if (pagesToExtract.length === 1) {
                const newPdf = await PDFDocument.create();
                const [copiedPage] = await newPdf.copyPages(originalPdf, [pagesToExtract[0]]);
                newPdf.addPage(copiedPage);
                createDownload(await newPdf.save(), `Pagina_${pagesToExtract[0] + 1}.pdf`, 'application/pdf');
            } else {
                const zip = new JSZip();
                for (const pageIndex of pagesToExtract) {
                    const singlePdf = await PDFDocument.create();
                    const [copied] = await singlePdf.copyPages(originalPdf, [pageIndex]);
                    singlePdf.addPage(copied);
                    zip.file(`Pagina_${pageIndex + 1}.pdf`, await singlePdf.save());
                }
                createDownload(await zip.generateAsync({type:"blob"}), `Paginas_Separadas.zip`, 'application/zip');
            }
        }

        async function processCompress() {
            const level = parseInt(state.compressionLevel);
            const arrayBuffer = await state.files[0].arrayBuffer();
            const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            
            const { PDFDocument } = window.PDFLib;
            const newPdf = await PDFDocument.create();
            let imgQuality = level === 25 ? 0.8 : (level === 75 ? 0.3 : 0.5);

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 }); 
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = viewport.width; canvas.height = viewport.height;
                
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                const newImg = await newPdf.embedJpg(canvas.toDataURL('image/jpeg', imgQuality));
                const newPage = newPdf.addPage([newImg.width, newImg.height]);
                newPage.drawImage(newImg, { x: 0, y: 0, width: newImg.width, height: newImg.height });
                canvas.width = 0; canvas.height = 0;
            }
            createDownload(await newPdf.save(), `Comprimido_${state.files[0].name}`, 'application/pdf');
        }

        async function processCreatePdf() {
            const { PDFDocument, StandardFonts, rgb } = window.PDFLib;
            const newPdf = await PDFDocument.create();

            for (const file of state.files) {
                const extension = file.name.split('.').pop().toLowerCase();
                const arrayBuffer = await file.arrayBuffer();

                if (extension === 'txt') {
                    const text = new TextDecoder("utf-8").decode(arrayBuffer);
                    const font = await newPdf.embedFont(StandardFonts.Helvetica);
                    let page = newPdf.addPage();
                    let yPos = page.getSize().height - 50;

                    for (const line of text.split('\n')) {
                        if (yPos < 50) { page = newPdf.addPage(); yPos = page.getSize().height - 50; }
                        try { page.drawText(line.replace(/\r/g, ''), { x: 50, y: yPos, size: 12, font, color: rgb(0,0,0) }); } catch(e) {}
                        yPos -= 15;
                    }
                } else if (['jpg', 'jpeg', 'png'].includes(extension)) {
                    let image = extension === 'png' ? await newPdf.embedPng(arrayBuffer) : await newPdf.embedJpg(arrayBuffer);
                    const page = newPdf.addPage([image.width, image.height]);
                    page.drawImage(image, { x: 0, y: 0, width: image.width, height: image.height });
                } else {
                    const font = await newPdf.embedFont(StandardFonts.HelveticaBold);
                    const page = newPdf.addPage();
                    page.drawText(`Archivo Procesado: ${file.name}`, { x: 50, y: 700, size: 20, font });
                }
            }
            createDownload(await newPdf.save(), 'Proyect_Creado.pdf', 'application/pdf');
        }

        async function processFromPdf() {
            const format = state.selectedExportFormat;
            const arrayBuffer = await state.files[0].arrayBuffer();
            const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

            if (format === 'jpg' || format === 'png') {
                const page = await pdfDoc.getPage(1);
                const viewport = page.getViewport({ scale: 2.0 }); 
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                
                const mimeType = format === 'png' ? 'image/png' : 'image/jpeg';
                const res = await fetch(canvas.toDataURL(mimeType, 1.0));
                createDownload(await res.arrayBuffer(), `Proyect_Imagen.${format}`, mimeType);
            } else {
                let fullTextHtml = "";
                for (let i = 1; i <= pdfDoc.numPages; i++) {
                    const page = await pdfDoc.getPage(i);
                    const textContent = await page.getTextContent();
                    fullTextHtml += `<p>${textContent.items.map(item => item.str).join(' ')}</p>`;
                }
                const ext = format === 'docx' ? 'doc' : 'xls';
                const mime = format === 'docx' ? 'application/msword' : 'application/vnd.ms-excel';
                const content = `<html xmlns:o="urn:schemas-microsoft-com:office:office"><head><meta charset="utf-8"></head><body>${fullTextHtml}</body></html>`;
                createDownload(content, `Proyect_Convertido.${ext}`, mime);
            }
        }

        // INIT
        document.addEventListener('DOMContentLoaded', render);
    </script>
