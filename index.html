<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyect PDF</title>
    
    <!-- Ícono de la pestaña del navegador -->
    <link rel="icon" href="favicon.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- PDF-Lib para procesamiento de PDFs (Unir, Crear, Dividir) -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    
    <!-- PDF.js para renderizado (Compresión) y extracción de texto -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <!-- JSZip para empaquetar en ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Fuente Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin 2s linear infinite; }
        
        body, nav, .tool-card, #dropzone {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-900 flex flex-col font-sans text-slate-900 dark:text-slate-100 selection:bg-blue-200 dark:selection:bg-blue-900 transition-colors duration-300">

    <div id="app" class="flex flex-col flex-grow"></div>

    <script>
        // --- STREAMING_CHUNK: Initializing Dark Mode ---
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // --- STREAMING_CHUNK: Configuring Tools Array ---
        const TOOLS = [
            {
                id: 'merge',
                title: 'Unir PDF',
                description: 'Une varios archivos (PDF o Imágenes) en un solo documento PDF.',
                icon: 'layers',
                iconColor: 'text-blue-500 dark:text-blue-400',
                color: 'hover:border-blue-500 dark:hover:border-blue-400 hover:shadow-blue-100 dark:hover:shadow-blue-900/20',
                accept: '.pdf, image/png, image/jpeg',
                multiple: true
            },
            {
                id: 'split',
                title: 'Dividir PDF',
                description: 'Extrae páginas específicas de tu documento PDF.',
                icon: 'scissors',
                iconColor: 'text-orange-500 dark:text-orange-400',
                color: 'hover:border-orange-500 dark:hover:border-orange-400 hover:shadow-orange-100 dark:hover:shadow-orange-900/20',
                accept: '.pdf',
                multiple: false
            },
            {
                id: 'compress',
                title: 'Comprimir PDF',
                description: 'Reduce el tamaño de tu PDF optimizando sus imágenes internas.',
                icon: 'minimize-2',
                iconColor: 'text-green-500 dark:text-green-400',
                color: 'hover:border-green-500 dark:hover:border-green-400 hover:shadow-green-100 dark:hover:shadow-green-900/20',
                accept: '.pdf',
                multiple: false
            },
            {
                id: 'to-pdf',
                title: 'Crear PDF',
                description: 'Crea archivos PDF a partir de textos (.txt) o imágenes.',
                icon: 'file-plus-2',
                iconColor: 'text-purple-500 dark:text-purple-400',
                color: 'hover:border-purple-500 dark:hover:border-purple-400 hover:shadow-purple-100 dark:hover:shadow-purple-900/20',
                accept: '.txt, .doc, .docx, .xls, .xlsx, .jpg, .jpeg, .png, image/jpeg, image/png',
                multiple: true
            },
            {
                id: 'from-pdf',
                title: 'PDF a Formato',
                description: 'Convierte tus archivos PDF a formatos editables o imágenes.',
                icon: 'arrow-right-left',
                iconColor: 'text-red-500 dark:text-red-400',
                color: 'hover:border-red-500 dark:hover:border-red-400 hover:shadow-red-100 dark:hover:shadow-red-900/20',
                accept: '.pdf',
                multiple: false
            },
            {
                id: 'remove-pages',
                title: 'Eliminar Páginas',
                description: 'Borra hojas específicas de un documento PDF.',
                icon: 'trash-2',
                iconColor: 'text-rose-500 dark:text-rose-400',
                color: 'hover:border-rose-500 dark:hover:border-rose-400 hover:shadow-rose-100 dark:hover:shadow-rose-900/20',
                accept: '.pdf',
                multiple: false
            },
            {
                id: 'number-pages',
                title: 'Numerar Páginas',
                description: 'Añade números de página a tu documento PDF.',
                icon: 'hash',
                iconColor: 'text-teal-500 dark:text-teal-400',
                color: 'hover:border-teal-500 dark:hover:border-teal-400 hover:shadow-teal-100 dark:hover:shadow-teal-900/20',
                accept: '.pdf',
                multiple: false
            },
            {
                id: 'convert-webp',
                title: 'Convertir WEBP',
                description: 'Cambia imágenes WEBP a formatos clásicos como JPG, JPEG o PNG.',
                icon: 'image',
                iconColor: 'text-indigo-500 dark:text-indigo-400',
                color: 'hover:border-indigo-500 dark:hover:border-indigo-400 hover:shadow-indigo-100 dark:hover:shadow-indigo-900/20',
                accept: '.webp, image/webp',
                multiple: false
            }
        ];

        // --- STREAMING_CHUNK: Initializing State Variables ---
        let state = {
            activeTool: null,
            files: [],
            filePreviews: [],
            fileRotations: [],
            isDragging: false,
            processingState: 'idle', 
            errorMessage: '',
            downloadUrl: null,
            downloadName: '',
            selectedExportFormat: 'docx',
            selectedImageFormat: 'jpg', // Formato de exportación para WEBP
            splitRange: '', 
            compressionLevel: '50',
            isTermsModalOpen: false,
            subscriptionStatus: 'idle', 
            subscriptionEmail: ''
        };

        // --- STREAMING_CHUNK: Rendering Main App Layout ---
        function render() {
            const app = document.getElementById('app');
            const isDark = document.documentElement.classList.contains('dark');
            let html = '';

            // Navbar
            html += `
                <nav class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-10 shadow-sm transition-colors duration-300">
                    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                        <div class="flex items-center gap-2 cursor-pointer" id="nav-logo">
                            <img src="favicon.png" alt="Logo" class="w-8 h-8 rounded-md object-contain" onerror="this.style.display='none';">
                            <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Proyect PDF</span>
                        </div>
                        
                        <div class="flex items-center gap-4">
                            <a href="https://ko-fi.com/jesusarvelo/tip" target="_blank" class="text-sm bg-rose-50 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 hover:bg-rose-100 dark:hover:bg-rose-900/50 px-4 py-2 rounded-full font-bold transition-colors shadow-sm border border-rose-200 dark:border-rose-800">
                                Donaciones
                            </a>
                        
                            ${state.activeTool ? `
                            <button id="back-btn" class="flex items-center gap-2 text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors relative z-20">
                                <i data-lucide="arrow-left" class="w-4 h-4 pointer-events-none"></i> Volver al inicio
                            </button>
                            ` : ''}
                            
                            <button id="theme-toggle" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors relative z-20" aria-label="Cambiar tema">
                                <i data-lucide="${isDark ? 'sun' : 'moon'}" class="w-5 h-5 pointer-events-none"></i>
                            </button>
                        </div>
                    </div>
                </nav>
            `;

            // Main Content
            html += '<main class="flex-grow flex flex-col">';
            if (!state.activeTool) {
                html += renderHome();
            } else {
                html += renderWorkspace();
            }
            html += '</main>';

            // Footer
            html += `
                <footer class="border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 mt-auto transition-colors duration-300">
                    <div class="max-w-6xl mx-auto px-4 py-8 flex flex-col md:flex-row items-center justify-between text-center md:text-left gap-4">
                        <div class="text-sm text-slate-500 dark:text-slate-400 flex flex-col">
                            <span class="font-medium text-slate-700 dark:text-slate-300">
                                🇻🇪 Desarrollado por Jesús Arvelo & G-AI
                            </span>
                            <span class="text-xs mt-1 opacity-75">(V. 1.0.1) © 2026 Todos los derechos reservados.</span>
                        </div>
                        <button id="open-terms-btn" class="text-sm text-blue-600 dark:text-blue-400 hover:underline hover:text-blue-800 dark:hover:text-blue-300 transition-colors">
                            Términos y Condiciones de Uso
                        </button>
                    </div>
                </footer>
            `;

            // Suggestions FAB
            html += `
                <button id="open-contact-btn" class="fixed bottom-6 right-6 bg-slate-900 dark:bg-blue-600 hover:bg-blue-600 dark:hover:bg-blue-500 text-white p-4 rounded-full shadow-lg hover:shadow-xl transition-all duration-300 z-40 group flex items-center gap-2" title="Enviar sugerencia o reporte">
                    <i data-lucide="message-square" class="w-6 h-6 pointer-events-none"></i>
                    <span class="max-w-0 overflow-hidden whitespace-nowrap group-hover:max-w-xs transition-all duration-300 ease-in-out font-medium pointer-events-none">
                        &nbsp;Sugerencias
                    </span>
                </button>
            `;

            // Modals
            if (state.isTermsModalOpen) {
                html += renderTermsModal();
            }
            if (state.isContactOpen) {
                html += renderContactModal();
            }

            app.innerHTML = html;
            lucide.createIcons();
            attachListeners();
        }

        // --- STREAMING_CHUNK: Rendering Home View with CTA ---
        function renderHome() {
            let cardsHtml = TOOLS.map(tool => `
                <div data-id="${tool.id}" class="tool-card flex flex-col h-full bg-white dark:bg-slate-800 p-6 rounded-2xl border-2 border-slate-100 dark:border-slate-700 cursor-pointer transition-all duration-200 shadow-sm hover:-translate-y-1 ${tool.color}">
                    <div class="bg-slate-50 dark:bg-slate-900/50 w-16 h-16 rounded-xl flex items-center justify-center mb-4 transition-colors">
                        <i data-lucide="${tool.icon}" class="w-8 h-8 ${tool.iconColor}"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 dark:text-white mb-2 transition-colors">${tool.title}</h3>
                    <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed transition-colors flex-grow">${tool.description}</p>
                </div>
            `).join('');

            let ctaHtml = `
                <div class="mt-20 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl p-8 md:p-12 text-center shadow-2xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 -mr-8 -mt-8 w-40 h-40 rounded-full bg-white opacity-10"></div>
                    <div class="absolute bottom-0 left-0 -ml-8 -mb-8 w-24 h-24 rounded-full bg-white opacity-10"></div>
                    
                    <div class="relative z-10 max-w-2xl mx-auto">
                        <span class="inline-block py-1 px-4 rounded-full bg-blue-500/30 text-blue-100 text-xs font-bold uppercase tracking-wider mb-4 border border-blue-400/30">
                            Próximamente
                        </span>
                        <h2 class="text-3xl md:text-4xl font-bold text-white mb-4">¡Lleva Maestro PDF en tu bolsillo!</h2>
                        <p class="text-blue-100 mb-8 text-lg">
                            Déjanos tu correo para ser de los primeros en probar nuestra nueva <strong>App para Android</strong> y recibir futuras actualizaciones de la plataforma.
                        </p>
                        
                        ${state.subscriptionStatus === 'success' ? `
                            <div class="bg-white/10 border border-white/20 rounded-xl p-4 flex items-center justify-center gap-3 text-white max-w-md mx-auto backdrop-blur-sm">
                                <i data-lucide="check-circle-2" class="w-6 h-6 text-green-400"></i>
                                <span class="font-medium">¡Gracias! Te hemos añadido a la lista de espera.</span>
                            </div>
                        ` : `
                            <form id="subscribe-form" class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto relative">
                                <div class="relative flex-grow">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i data-lucide="mail" class="h-5 w-5 text-blue-200"></i>
                                    </div>
                                    <input type="email" id="subscriber-email" required placeholder="tu@correo.com" class="w-full pl-10 pr-4 py-3 rounded-xl border border-white/20 focus:ring-2 focus:ring-white/50 bg-white/10 text-white placeholder-blue-200 outline-none backdrop-blur-sm transition-all shadow-inner" value="${state.subscriptionEmail}">
                                </div>
                                <button type="submit" class="bg-white text-blue-700 hover:bg-blue-50 font-bold py-3 px-6 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg min-w-[140px]">
                                    ${state.subscriptionStatus === 'subscribing' ? `
                                        <i data-lucide="loader-2" class="w-5 h-5 animate-spin-slow"></i>
                                    ` : `
                                        Suscribirme <i data-lucide="send" class="w-4 h-4"></i>
                                    `}
                                </button>
                            </form>
                        `}
                    </div>
                </div>
            `;

            return `
                <div class="max-w-6xl mx-auto px-4 py-12 flex-grow">
                    <div class="text-center mb-16">
                        <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 dark:text-white tracking-tight mb-4 transition-colors">
                            Proyect <span class="text-blue-600 dark:text-blue-500">PDF</span>
                        </h1>
                        <p class="text-lg text-slate-600 dark:text-slate-400 max-w-2xl mx-auto transition-colors mb-6">
                            Todas las herramientas que necesitas para trabajar con archivos PDF en un solo lugar. 
                            Rápido, seguro y fácil de usar directamente en tu navegador.
                        </p>
                        
                        <!-- INSIGNIA DE PRIVACIDAD RESTAURADA -->
                        <div class="inline-flex items-center gap-2 bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-[#39ff14] px-4 py-2 rounded-full border border-green-200 dark:border-[#39ff14]/30 shadow-sm dark:shadow-[0_0_15px_rgba(57,255,20,0.1)] transition-colors">
                            <i data-lucide="lock" class="w-4 h-4"></i>
                            <span class="text-sm font-semibold tracking-wide">Privacidad Absoluta: Tus archivos nunca salen de tu ordenador</span>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 items-stretch">
                        ${cardsHtml}
                    </div>
                    ${ctaHtml}
                </div>
            `;
        }

        // --- STREAMING_CHUNK: Rendering Workspace View ---
        function renderWorkspace() {
            const tool = state.activeTool;
            let workspaceContent = '';

            if (state.processingState === 'idle') {
                workspaceContent = `
                    <div class="p-8">
                        <div id="dropzone" class="border-2 border-dashed rounded-2xl p-12 text-center transition-all duration-200 
                            ${state.isDragging 
                                ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/20' 
                                : 'border-slate-300 dark:border-slate-600 hover:border-slate-400 dark:hover:border-slate-500 bg-slate-50 dark:bg-slate-800/50'}">
                            
                            <input type="file" id="file-input" class="hidden" accept="${tool.accept}" ${tool.multiple ? 'multiple' : ''} />
                            
                            <div class="flex justify-center mb-4">
                                <i data-lucide="upload-cloud" class="w-16 h-16 ${state.isDragging ? 'text-blue-500' : 'text-slate-400 dark:text-slate-500'}"></i>
                            </div>
                            <h3 class="text-xl font-semibold text-slate-700 dark:text-slate-200 mb-2 transition-colors">Arrastra tus archivos aquí</h3>
                            <p class="text-slate-500 dark:text-slate-400 mb-6 transition-colors">o haz clic para seleccionar de tu dispositivo</p>
                            
                            <button id="select-files-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-xl transition-colors shadow-sm">
                                Seleccionar Archivos
                            </button>
                            <p class="text-xs text-slate-400 dark:text-slate-500 mt-4 transition-colors">Formatos soportados: ${tool.accept}</p>
                        </div>

                        ${state.files.length > 0 ? `
                        <div class="mt-8">
                            <h4 class="font-semibold text-slate-700 dark:text-slate-300 mb-4 transition-colors">Archivos listos para procesar:</h4>
                            <ul class="space-y-3 mb-6">
                                ${state.files.map((file, idx) => `
                                <li class="flex items-center justify-between bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border border-slate-100 dark:border-slate-700 transition-colors">
                                    <div class="flex items-center gap-3 overflow-hidden">
                                        ${state.filePreviews[idx] 
                                            ? `<div class="w-12 h-12 flex-shrink-0 bg-slate-200 dark:bg-slate-700 rounded overflow-hidden flex items-center justify-center border border-slate-300 dark:border-slate-600">
                                                   <img src="${state.filePreviews[idx]}" class="max-w-full max-h-full object-contain" style="transform: rotate(${state.fileRotations[idx] || 0}deg); transition: transform 0.3s ease;" />
                                               </div>`
                                            : `<div class="w-12 h-12 flex-shrink-0 flex items-center justify-center transition-transform duration-300" style="transform: rotate(${state.fileRotations[idx] || 0}deg);">
                                                   <i data-lucide="file-text" class="w-8 h-8 text-slate-400 dark:text-slate-500"></i>
                                               </div>`
                                        }
                                        <div class="flex flex-col truncate">
                                            <span class="font-medium text-slate-700 dark:text-slate-200 truncate transition-colors">${file.name}</span>
                                            <span class="text-xs text-slate-400 dark:text-slate-500 transition-colors">(${(file.size / 1024 / 1024).toFixed(2)} MB)</span>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        ${(state.filePreviews[idx] || file.type === 'application/pdf' || file.name.endsWith('.pdf')) ? `
                                        <button data-rotate="${idx}" class="rotate-file-btn text-blue-500 hover:text-blue-600 transition-colors p-2 bg-blue-50 dark:bg-blue-900/30 rounded-lg hover:bg-blue-100 dark:hover:bg-blue-800/50" title="Girar archivo 90°">
                                            <i data-lucide="rotate-cw" class="w-5 h-5 pointer-events-none"></i>
                                        </button>
                                        ` : ''}
                                        <button data-index="${idx}" class="remove-file-btn text-slate-400 dark:text-slate-500 hover:text-red-500 dark:hover:text-red-400 transition-colors p-2 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-lg" title="Eliminar archivo">
                                            <i data-lucide="x" class="w-5 h-5 pointer-events-none"></i>
                                        </button>
                                    </div>
                                </li>
                                `).join('')}
                            </ul>

                            ${tool.id === 'from-pdf' ? `
                            <div class="mt-6 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Convertir a:</label>
                                <select id="export-format" class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 transition-colors">
                                    <option value="docx" ${state.selectedExportFormat === 'docx' ? 'selected' : ''}>Microsoft Word (.docx)</option>
                                    <option value="xlsx" ${state.selectedExportFormat === 'xlsx' ? 'selected' : ''}>Microsoft Excel (.xlsx)</option>
                                    <option value="jpg" ${state.selectedExportFormat === 'jpg' ? 'selected' : ''}>Imagen JPEG (.jpg)</option>
                                    <option value="png" ${state.selectedExportFormat === 'png' ? 'selected' : ''}>Imagen PNG (.png)</option>
                                </select>
                            </div>
                            ` : ''}

                            ${(tool.id === 'split' || tool.id === 'remove-pages') ? `
                            <div class="mt-6 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Rango de páginas (ej. 1, 3, 5-8):</label>
                                <input type="text" id="split-range" value="${state.splitRange}" placeholder="Ej: 1, 3, 5-8" class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 transition-colors">
                                <p class="text-xs text-slate-500 mt-2">${tool.id === 'split' ? 'Si extraes varias páginas, se descargarán ordenadas independientemente en un archivo .ZIP' : 'Las páginas especificadas serán eliminadas del documento final.'}</p>
                            </div>
                            ` : ''}
                            
                            ${tool.id === 'compress' ? `
                            <div class="mt-6 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Nivel de compresión:</label>
                                <select id="compression-level" class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 transition-colors">
                                    <option value="25" ${state.compressionLevel === '25' ? 'selected' : ''}>25% - Calidad Excelente (Menos compresión)</option>
                                    <option value="50" ${state.compressionLevel === '50' ? 'selected' : ''}>50% - Calidad Media (Equilibrio ideal)</option>
                                    <option value="75" ${state.compressionLevel === '75' ? 'selected' : ''}>75% - Calidad Básica (Mayor compresión)</option>
                                </select>
                            </div>
                            ` : ''}

                            ${tool.id === 'convert-webp' ? `
                            <div class="mt-6 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Convertir a formato:</label>
                                <select id="image-export-format" class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 transition-colors">
                                    <option value="jpg" ${state.selectedImageFormat === 'jpg' ? 'selected' : ''}>JPG (.jpg)</option>
                                    <option value="jpeg" ${state.selectedImageFormat === 'jpeg' ? 'selected' : ''}>JPEG (.jpeg)</option>
                                    <option value="png" ${state.selectedImageFormat === 'png' ? 'selected' : ''}>PNG (.png)</option>
                                </select>
                            </div>
                            ` : ''}

        // --- STREAMING_CHUNK: Event Listeners & Logic ---
        function attachListeners() {
            // Theme Toggle
            const themeToggleBtn = document.getElementById('theme-toggle');
            if (themeToggleBtn) {
                themeToggleBtn.addEventListener('click', () => {
                    try {
                        const htmlElement = document.documentElement;
                        if (htmlElement.classList.contains('dark')) {
                            htmlElement.classList.remove('dark');
                            localStorage.setItem('theme', 'light');
                        } else {
                            htmlElement.classList.add('dark');
                            localStorage.setItem('theme', 'dark');
                        }
                    } catch(e) {}
                    render(); 
                });
            }

            // Navigation
            const navLogo = document.getElementById('nav-logo');
            if (navLogo) navLogo.onclick = () => { state.activeTool = null; resetWorkspace(); };
            
            const backBtn = document.getElementById('back-btn');
            if (backBtn) backBtn.onclick = () => { state.activeTool = null; resetWorkspace(); };

            // Modals
            const openTermsBtn = document.getElementById('open-terms-btn');
            if (openTermsBtn) {
                openTermsBtn.onclick = () => {
                    state.isTermsModalOpen = true;
                    render();
                    document.body.style.overflow = 'hidden';
                };
            }
            const closeModal = () => {
                state.isTermsModalOpen = false;
                render();
                document.body.style.overflow = 'auto'; 
            };
            const closeTermsBtn = document.getElementById('close-terms-btn');
            const closeTermsX = document.getElementById('close-terms-x');
            const termsOverlay = document.getElementById('terms-modal-overlay');
            if (closeTermsBtn) closeTermsBtn.onclick = closeModal;
            if (closeTermsX) closeTermsX.onclick = closeModal;
            if (termsOverlay) {
                termsOverlay.onclick = (e) => { if (e.target === termsOverlay) closeModal(); };
            }

            // Contact Modal
            const openContactBtn = document.getElementById('open-contact-btn');
            if (openContactBtn) {
                openContactBtn.onclick = () => {
                    state.isContactOpen = true;
                    render();
                    document.body.style.overflow = 'hidden';
                };
            }
            const closeContactModal = () => {
                state.isContactOpen = false;
                state.contactStatus = 'idle'; // Reset on close
                render();
                document.body.style.overflow = 'auto'; 
            };
            const closeContactX = document.getElementById('close-contact-x');
            const contactOverlay = document.getElementById('contact-modal-overlay');
            if (closeContactX) closeContactX.onclick = closeContactModal;
            if (contactOverlay) {
                contactOverlay.onclick = (e) => { if (e.target === contactOverlay) closeContactModal(); };
            }

            // Contact Form Submit
            const contactForm = document.getElementById('contact-form');
            if (contactForm) {
                contactForm.onsubmit = (e) => {
                    e.preventDefault();
                    const messageInput = document.getElementById('contact-message');
                    const emailInput = document.getElementById('contact-email');
                    
                    if (messageInput && messageInput.value) {
                        state.contactMessage = messageInput.value;
                        state.contactEmail = emailInput ? emailInput.value : '';
                        state.contactStatus = 'sending';
                        render();
                        
                        const googleScriptUrl = "https://script.google.com/macros/s/AKfycbzFcQubKPubo319RkUJDeqelQxqjVZ3p2wttrc-hjdP-Rh2V8rTxG0NIgIaQiEgPr11TA/exec";

                        // Using URLSearchParams directly as requested
                        const formData = new URLSearchParams();
                        formData.append('mensaje', state.contactMessage);
                        formData.append('correo', state.contactEmail);

                        fetch(googleScriptUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            body: formData
                        })
                        .then(() => {
                            state.contactStatus = 'success';
                            state.contactMessage = '';
                            state.contactEmail = '';
                            render();
                            // Auto-close after 3 seconds
                            setTimeout(() => {
                                closeContactModal();
                            }, 3000);
                        })
                        .catch(error => {
                            console.error("Error al enviar:", error);
                            state.contactStatus = 'idle';
                            alert("Hubo un problema de conexión. Por favor intenta más tarde.");
                            render();
                        });
                    }
                };
            }
            
            // Re-bind inputs on render so typing works smoothly
            const contactMessageInput = document.getElementById('contact-message');
            if (contactMessageInput) {
                contactMessageInput.oninput = (e) => { state.contactMessage = e.target.value; };
            }
            const contactEmailInput = document.getElementById('contact-email');
            if (contactEmailInput) {
                contactEmailInput.oninput = (e) => { state.contactEmail = e.target.value; };
            }

            // Subscription Form
            const subscribeForm = document.getElementById('subscribe-form');
            if (subscribeForm) {
                subscribeForm.onsubmit = (e) => {
                    e.preventDefault();
                    const emailInput = document.getElementById('subscriber-email');
                    if (emailInput && emailInput.value) {
                        state.subscriptionEmail = emailInput.value;
                        state.subscriptionStatus = 'subscribing';
                        render();
                        
                        const googleScriptUrl = "https://script.google.com/macros/s/AKfycbzFcQubKPubo319RkUJDeqelQxqjVZ3p2wttrc-hjdP-Rh2V8rTxG0NIgIaQiEgPr11TA/exec";

                        fetch(googleScriptUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            body: new URLSearchParams({ 'email': state.subscriptionEmail })
                        })
                        .then(() => {
                            state.subscriptionStatus = 'success';
                            state.subscriptionEmail = '';
                            render();
                        })
                        .catch(error => {
                            console.error("Error al guardar:", error);
                            state.subscriptionStatus = 'idle';
                            render();
                        });
                    }
                };
            }

            if (!state.activeTool) {
                document.querySelectorAll('.tool-card').forEach(card => {
                    card.onclick = () => {
                        const toolId = card.getAttribute('data-id');
                        state.activeTool = TOOLS.find(t => t.id === toolId);

            } else {
                const dropzone = document.getElementById('dropzone');

                const selectFilesBtn = document.getElementById('select-files-btn');

                const resetBtn = document.getElementById('reset-btn');
                const resetBtnErr = document.getElementById('reset-btn-err');

                if (dropzone) {
                    dropzone.ondragover = (e) => { e.preventDefault(); state.isDragging = true; render(); };
                    dropzone.ondragleave = (e) => { e.preventDefault(); state.isDragging = false; render(); };
                    dropzone.ondrop = (e) => {
                        e.preventDefault();
                        state.isDragging = false;
                        if (e.dataTransfer.files.length > 0) handleFiles(Array.from(e.dataTransfer.files));
                    };
                }

                if (selectFilesBtn && fileInput) {
                    selectFilesBtn.onclick = () => fileInput.click();
                    fileInput.onchange = (e) => {
                        if (e.target.files.length > 0) handleFiles(Array.from(e.target.files));
                    };
                }

                const formatSelect = document.getElementById('export-format');
                if (formatSelect) formatSelect.onchange = (e) => { state.selectedExportFormat = e.target.value; };

                const imgFormatSelect = document.getElementById('image-export-format');
                if (imgFormatSelect) imgFormatSelect.onchange = (e) => { state.selectedImageFormat = e.target.value; };

                const splitRangeInput = document.getElementById('split-range');
                if (splitRangeInput) splitRangeInput.oninput = (e) => { state.splitRange = e.target.value; };

                const compressionSelect = document.getElementById('compression-level');
                if (compressionSelect) compressionSelect.onchange = (e) => { state.compressionLevel = e.target.value; };

                if (processBtn) processBtn.onclick = processFiles;
                if (resetBtn) resetBtn.onclick = resetWorkspace;
                if (resetBtnErr) resetBtnErr.onclick = resetWorkspace;

                document.querySelectorAll('.rotate-file-btn').forEach(btn => {
                    btn.onclick = (e) => {
                        const index = parseInt(e.currentTarget.getAttribute('data-rotate'));
                        state.fileRotations[index] = ((state.fileRotations[index] || 0) + 90) % 360;
                        render();
                    };
                });

                document.querySelectorAll('.remove-file-btn').forEach(btn => {
                    btn.onclick = (e) => {
                        const index = parseInt(e.currentTarget.getAttribute('data-index'));
                        state.files.splice(index, 1);
                        state.filePreviews.splice(index, 1);
                        state.fileRotations.splice(index, 1);
                        render();
                    };
                });
            }
        }

        // --- STREAMING_CHUNK: Helpers ---
        function handleFiles(newFiles) {
            let validFiles = Array.from(newFiles);
            if (state.activeTool.multiple) {
                state.files = [...state.files, ...validFiles];
            } else {
                state.files = [validFiles[0]];
            }
            
            // Generar miniaturas y establecer rotaciones iniciales
            state.filePreviews = state.files.map(file => {
                if (file && file.type && file.type.startsWith('image/')) {
                    return URL.createObjectURL(file);
                }
                return null;
            });
            state.fileRotations = state.files.map((_, i) => state.fileRotations[i] || 0);
            
            render();
        }

        function resetWorkspace() {
            state.files = [];
            state.filePreviews = [];
            state.fileRotations = [];
            state.processingState = 'idle';
            state.downloadUrl = null;
            state.downloadName = '';
            state.errorMessage = '';
            render();
        }

        function createDownload(data, filename, type) {
            let blob;
            if (typeof data === 'string') blob = new Blob([data], { type: type });
            else blob = new Blob([data], { type: type });
            
            const url = URL.createObjectURL(blob);
            state.downloadUrl = url;
            state.downloadName = filename;
            state.processingState = 'done';
            render();
        }

        function parsePageRange(rangeStr, maxPages) {
            const indices = new Set();
            if (!rangeStr.trim()) return [0];

            const parts = rangeStr.split(',');
            for (let part of parts) {
                part = part.trim();
                if (part.includes('-')) {
                    const [startStr, endStr] = part.split('-');
                    let start = parseInt(startStr);
                    let end = parseInt(endStr);
                    if (!isNaN(start) && !isNaN(end)) {
                        start = Math.max(1, start);
                        end = Math.min(maxPages, end);
                        for (let i = start; i <= end; i++) indices.add(i - 1);
                    }
                } else {
                    const num = parseInt(part);
                    if (!isNaN(num) && num >= 1 && num <= maxPages) {
                        indices.add(num - 1);
                    }
                }
            }
            return Array.from(indices).sort((a, b) => a - b);
        }

        // --- STREAMING_CHUNK: Core Processing Engine ---
        async function processFiles() {
            if (state.files.length === 0) return;
            state.processingState = 'processing';
            render();

            try {
                if (state.activeTool.id === 'merge') {
                    await processMerge();
                } else if (state.activeTool.id === 'split') {
                    await processSplit();
                } else if (state.activeTool.id === 'compress') {
                    await processCompress();
                } else if (state.activeTool.id === 'to-pdf') {
                    await processCreatePdf();
                } else if (state.activeTool.id === 'from-pdf') {
                    await processFromPdf();
                } else if (state.activeTool.id === 'remove-pages') {
                    await processRemovePages();
                } else if (state.activeTool.id === 'number-pages') {
                    await processNumberPages();
                } else if (state.activeTool.id === 'convert-webp') {
                    await processConvertWebp();
                }
            } catch (error) {
                console.error("Error en procesamiento:", error);
                state.errorMessage = 'Ocurrió un error al procesar el archivo. Verifique que el archivo sea válido y no esté dañado.';
                state.processingState = 'error';
                render();
            }
        }

        async function processMerge() {
            const { PDFDocument, degrees } = window.PDFLib;
            const mergedPdf = await PDFDocument.create();

            // Helper para rotar imágenes usando Canvas de HTML garantizando que no se corten
            const rotateImageFile = async (file, angle, extension) => {
                if (angle === 0 || angle % 360 === 0) return await file.arrayBuffer();
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        if (angle % 180 !== 0) {
                            canvas.width = img.height;
                            canvas.height = img.width;
                        } else {
                            canvas.width = img.width;
                            canvas.height = img.height;
                        }
                        ctx.translate(canvas.width / 2, canvas.height / 2);
                        ctx.rotate((angle * Math.PI) / 180);
                        ctx.drawImage(img, -img.width / 2, -img.height / 2);
                        const mime = extension === 'png' ? 'image/png' : 'image/jpeg';
                        canvas.toBlob(blob => blob.arrayBuffer().then(resolve), mime, 1.0);
                    };
                    img.src = URL.createObjectURL(file);
                });
            };

            for (let i = 0; i < state.files.length; i++) {
                const file = state.files[i];
                const angle = state.fileRotations[i] || 0;
                
                if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await PDFDocument.load(arrayBuffer);
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    
                    copiedPages.forEach((page) => {
                        if (angle !== 0) {
                            const currentRotation = page.getRotation().angle;
                            page.setRotation(degrees((currentRotation + angle) % 360));
                        }
                        mergedPdf.addPage(page);
                    });
                } else if (file.type.startsWith('image/')) {
                    const isPng = file.type === 'image/png' || file.name.endsWith('.png');
                    const arrayBuffer = await rotateImageFile(file, angle, isPng ? 'png' : 'jpeg');
                    
                    let image;
                    if (!isPng) image = await mergedPdf.embedJpg(arrayBuffer);
                    else image = await mergedPdf.embedPng(arrayBuffer);
                    
                    if (image) {
                        const page = mergedPdf.addPage([image.width, image.height]);
                        page.drawImage(image, { x: 0, y: 0, width: image.width, height: image.height });
                    }
                }
            }
            const mergedPdfBytes = await mergedPdf.save();
            createDownload(mergedPdfBytes, 'Archivos_Unidos.pdf', 'application/pdf');
        }

        async function processSplit() {
            const { PDFDocument } = window.PDFLib;
            const file = state.files[0];
            const arrayBuffer = await file.arrayBuffer();
            
            const originalPdf = await PDFDocument.load(arrayBuffer);
            const totalPages = originalPdf.getPageCount();
            const pagesToExtract = parsePageRange(state.splitRange, totalPages);
            
            if (pagesToExtract.length === 0) throw new Error("Rango inválido");

            if (pagesToExtract.length === 1) {
                const newPdf = await PDFDocument.create();
                const [copiedPage] = await newPdf.copyPages(originalPdf, [pagesToExtract[0]]);
                newPdf.addPage(copiedPage);
                const bytes = await newPdf.save();
                createDownload(bytes, `Pagina_${pagesToExtract[0] + 1}.pdf`, 'application/pdf');
            } else {
                if (!window.JSZip) throw new Error("ZIP no disponible");
                const zip = new JSZip();
                
                for (const pageIndex of pagesToExtract) {
                    const singlePdf = await PDFDocument.create();
                    const [copied] = await singlePdf.copyPages(originalPdf, [pageIndex]);
                    singlePdf.addPage(copied);
                    const bytes = await singlePdf.save();
                    zip.file(`Pagina_${pageIndex + 1}.pdf`, bytes);
                }

                const zipContent = await zip.generateAsync({type:"blob"});
                const url = URL.createObjectURL(zipContent);
                state.downloadUrl = url;
                state.downloadName = `Paginas_Separadas.zip`;
                state.processingState = 'done';
                render();
            }
        }

        async function processCompress() {
            const file = state.files[0];
            const level = parseInt(state.compressionLevel);
            
            if (!window.pdfjsLib) throw new Error("Motor PDF no disponible.");

            const arrayBuffer = await file.arrayBuffer();
            const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
            const pdfDoc = await loadingTask.promise;
            
            const { PDFDocument } = window.PDFLib;
            const newPdf = await PDFDocument.create();

            let imgQuality = 0.5; 
            if (level === 25) imgQuality = 0.8;
            if (level === 75) imgQuality = 0.3;

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 }); 
                
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                
                const imgDataUrl = canvas.toDataURL('image/jpeg', imgQuality);
                const newImg = await newPdf.embedJpg(imgDataUrl);
                const newPage = newPdf.addPage([newImg.width, newImg.height]);
                newPage.drawImage(newImg, { x: 0, y: 0, width: newImg.width, height: newImg.height });
                
                // Cleanup canvas
                canvas.width = 0;
                canvas.height = 0;
            }

            const compressedBytes = await newPdf.save();
            createDownload(compressedBytes, `Comprimido_${file.name}`, 'application/pdf');
        }

        async function processCreatePdf() {
            const { PDFDocument, StandardFonts, rgb } = window.PDFLib;
            const newPdf = await PDFDocument.create();

            // Helper para rotar imágenes usando Canvas de HTML garantizando que no se corten
            const rotateImageFile = async (file, angle, extension) => {
                if (angle === 0 || angle % 360 === 0) return await file.arrayBuffer();
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        if (angle % 180 !== 0) {
                            canvas.width = img.height;
                            canvas.height = img.width;
                        } else {
                            canvas.width = img.width;
                            canvas.height = img.height;
                        }
                        ctx.translate(canvas.width / 2, canvas.height / 2);
                        ctx.rotate((angle * Math.PI) / 180);
                        ctx.drawImage(img, -img.width / 2, -img.height / 2);
                        const mime = extension === 'png' ? 'image/png' : 'image/jpeg';
                        canvas.toBlob(blob => blob.arrayBuffer().then(resolve), mime, 1.0);
                    };
                    img.src = URL.createObjectURL(file);
                });
            };

            for (let i = 0; i < state.files.length; i++) {
                const file = state.files[i];
                const angle = state.fileRotations[i] || 0;
                const extension = file.name.split('.').pop().toLowerCase();

                if (extension === 'txt') {
                    const arrayBuffer = await file.arrayBuffer();
                    const text = new TextDecoder("utf-8").decode(arrayBuffer);
                    const font = await newPdf.embedFont(StandardFonts.Helvetica);
                    const fontSize = 12;
                    let page = newPdf.addPage();
                    let { width, height } = page.getSize();
                    let yPos = height - 50;

                    const lines = text.split('\n');
                    for (const line of lines) {
                        if (yPos < 50) {
                            page = newPdf.addPage();
                            yPos = height - 50;
                        }
                        try {
                            page.drawText(line.replace(/\r/g, ''), { x: 50, y: yPos, size: fontSize, font: font, color: rgb(0,0,0) });
                        } catch(e) {}
                        yPos -= 15;
                    }
                } else if (['jpg', 'jpeg', 'png'].includes(extension)) {
                    const isPng = extension === 'png';
                    const arrayBuffer = await rotateImageFile(file, angle, isPng ? 'png' : 'jpeg');
                    
                    let image;
                    if (isPng) image = await newPdf.embedPng(arrayBuffer);
                    else image = await newPdf.embedJpg(arrayBuffer);
                    const page = newPdf.addPage([image.width, image.height]);
                    page.drawImage(image, { x: 0, y: 0, width: image.width, height: image.height });
                } else {
                    const font = await newPdf.embedFont(StandardFonts.HelveticaBold);
                    const page = newPdf.addPage();
                    page.drawText(`Archivo Procesado: ${file.name}`, { x: 50, y: 700, size: 20, font });
                    page.drawText(`Este documento fue insertado correctamente.`, { x: 50, y: 650, size: 12 });
                }
            }

            const pdfBytes = await newPdf.save();
            createDownload(pdfBytes, 'Arvelo_Creado.pdf', 'application/pdf');
        }

        async function processFromPdf() {
            const file = state.files[0];
            const format = state.selectedExportFormat;

            if (!window.pdfjsLib) throw new Error("Motor no disponible.");

            const arrayBuffer = await file.arrayBuffer();
            const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
            const pdfDoc = await loadingTask.promise;

            if (format === 'jpg' || format === 'png') {
                const page = await pdfDoc.getPage(1);
                const viewport = page.getViewport({ scale: 2.0 }); 
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                
                const mimeType = format === 'png' ? 'image/png' : 'image/jpeg';
                const dataUrl = canvas.toDataURL(mimeType, 1.0);
                const res = await fetch(dataUrl);
                const imgBytes = await res.arrayBuffer();
                
                createDownload(imgBytes, `Arvelo_Imagen.${format}`, mimeType);
            } else {
                let fullTextHtml = "";
                let fullTextExcel = "";

                for (let i = 1; i <= pdfDoc.numPages; i++) {
                    const page = await pdfDoc.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    
                    fullTextHtml += `<p>${pageText}</p>`;
                    fullTextExcel += `<tr><td><b>Página ${i}</b></td><td>${pageText}</td></tr>`;
                }

                let content = "";
                let ext = "";
                let mimeType = "";

                if (format === 'docx') {
                    ext = 'doc'; 
                    mimeType = 'application/msword';
                    content = `
                        <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
                        <head><meta charset="utf-8"><title>Documento</title></head>
                        <body>
                            <h1>Contenido de: ${file.name}</h1>
                            <hr>
                            ${fullTextHtml}
                        </body>
                        </html>
                    `;
                } else if (format === 'xlsx') {
                    ext = 'xls'; 
                    mimeType = 'application/vnd.ms-excel';
                    content = `
                        <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
                        <head><meta charset="utf-8"></head>
                        <body>
                            <table border="1">
                                <tr><th colspan="2" style="background-color:#4CAF50;color:white;">Contenido de: ${file.name}</th></tr>
                                ${fullTextExcel}
                            </table>
                        </body>
                        </html>
                    `;
                }
                createDownload(content, `Arvelo_Convertido.${ext}`, mimeType);
            }
        }

        async function processRemovePages() {
            const { PDFDocument } = window.PDFLib;
            const file = state.files[0];
            const arrayBuffer = await file.arrayBuffer();
            
            const originalPdf = await PDFDocument.load(arrayBuffer);
            const totalPages = originalPdf.getPageCount();
            const pagesToRemove = parsePageRange(state.splitRange, totalPages);
            
            if (pagesToRemove.length === 0) throw new Error("Rango inválido");

            const newPdf = await PDFDocument.create();
            const pagesToKeep = [];
            for (let i = 0; i < totalPages; i++) {
                if (!pagesToRemove.includes(i)) {
                    pagesToKeep.push(i);
                }
            }

            if (pagesToKeep.length === 0) throw new Error("No puedes eliminar todas las páginas del documento.");

            const copiedPages = await newPdf.copyPages(originalPdf, pagesToKeep);
            copiedPages.forEach((page) => newPdf.addPage(page));

            const bytes = await newPdf.save();
            createDownload(bytes, `Arvelo_Editado_${file.name}`, 'application/pdf');
        }

        async function processNumberPages() {
            const { PDFDocument, StandardFonts, rgb } = window.PDFLib;
            const file = state.files[0];
            const arrayBuffer = await file.arrayBuffer();
            
            const pdfDoc = await PDFDocument.load(arrayBuffer);
            const pages = pdfDoc.getPages();
            const helveticaFont = await pdfDoc.embedFont(StandardFonts.Helvetica);

            pages.forEach((page, idx) => {
                const { width } = page.getSize();
                const text = `${idx + 1}`;
                const textWidth = helveticaFont.widthOfTextAtSize(text, 12);
                
                page.drawText(text, {
                    x: width / 2 - textWidth / 2,
                    y: 20,
                    size: 12,
                    font: helveticaFont,
                    color: rgb(0, 0, 0)
                });
            });

            const bytes = await pdfDoc.save();
            createDownload(bytes, `Arvelo_Numerado_${file.name}`, 'application/pdf');
        }

        async function processConvertWebp() {
            const file = state.files[0];
            const format = state.selectedImageFormat;
            
            const img = new Image();
            const objectUrl = URL.createObjectURL(file);
            
            await new Promise((resolve, reject) => {
                img.onload = resolve;
                img.onerror = () => reject(new Error("No se pudo cargar la imagen WEBP."));
                img.src = objectUrl;
            });
            
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            
            // Si es JPG o JPEG, rellenamos el fondo de blanco para evitar fondo negro en transparencias WEBP
            if (format === 'jpg' || format === 'jpeg') {
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            ctx.drawImage(img, 0, 0);
            
            const mimeType = (format === 'png') ? 'image/png' : 'image/jpeg';
            const dataUrl = canvas.toDataURL(mimeType, 1.0);
            
            const res = await fetch(dataUrl);
            const arrayBuffer = await res.arrayBuffer();
            
            URL.revokeObjectURL(objectUrl);
            canvas.width = 0;
            canvas.height = 0;
            
            const originalName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            const newName = `${originalName}_convertido.${format}`;
            
            createDownload(arrayBuffer, newName, mimeType);
        }

        // --- Init ---
        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
