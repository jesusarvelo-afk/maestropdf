<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arvelo Maestro PDF | Herramientas Profesionales</title>
    
    <!-- Etiquetas SEO -->
    <meta name="description" content="Arvelo Maestro PDF: Todas las herramientas que necesitas para trabajar con archivos PDF en un solo lugar. Rápido, seguro y fácil de usar directamente en tu navegador.">
    <meta name="author" content="Jesús Arvelo">
    
    <!-- Favicon: Siglas AJJ minimalistas -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='32' height='32'%3E%3Crect width='24' height='24' rx='4' fill='%232563eb'/%3E%3Ctext x='12' y='17' font-family='sans-serif' font-size='9' font-weight='bold' fill='white' text-anchor='middle'%3EAJJ%3C/text%3E%3C/svg%3E">

    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .toast-enter { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast-exit { animation: slideOut 0.3s ease-in forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin 2s linear infinite; }
        .loader { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid white; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .dark .glass-nav { background: rgba(15, 23, 42, 0.9); }
        
        .drop-zone-active { border-color: #3b82f6 !important; background-color: rgba(59, 130, 246, 0.05) !important; }
        body, nav, .tool-card, #dropzone { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans transition-colors duration-300 flex flex-col relative pb-20">

    <div id="app" class="flex flex-col flex-grow"></div>
    
    <div id="toast-container" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script>
        // --- STREAMING_CHUNK: Constants ---
        const URL_SUGERENCIAS = "https://script.google.com/macros/s/AKfycbxw6LThSnaQDdSedR-CD5XmT_6PB_vynTqQB7sIGy5frIKobXaE-TL4IAkPCzqpH_WL/exec";
        const MAX_FILE_SIZE = 101 * 1024 * 1024;

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        const TOOLS = [
            { id: 'merge', title: 'Unir PDF', description: 'Une varios archivos en un solo documento PDF.', icon: 'layers', iconColor: 'text-blue-500 dark:text-blue-400', color: 'hover:border-blue-500', accept: '.pdf, image/png, image/jpeg', multiple: true },
            { id: 'split', title: 'Dividir PDF', description: 'Extrae páginas específicas a un archivo ZIP.', icon: 'scissors', iconColor: 'text-orange-500 dark:text-orange-400', color: 'hover:border-orange-500', accept: '.pdf', multiple: false },
            { id: 'compress', title: 'Comprimir PDF', description: 'Reduce el tamaño de tu PDF optimizando imágenes.', icon: 'minimize-2', iconColor: 'text-green-500 dark:text-green-400', color: 'hover:border-green-500', accept: '.pdf', multiple: false },
            { id: 'to-pdf', title: 'Crear PDF', description: 'Crea archivos PDF a partir de textos o imágenes.', icon: 'file-plus-2', iconColor: 'text-purple-500 dark:text-purple-400', color: 'hover:border-purple-500', accept: '.txt,.doc,.docx,.xls,.xlsx,.jpg,.png', multiple: true },
            { id: 'from-pdf', title: 'PDF a Formato', description: 'Convierte archivos PDF a formatos editables.', icon: 'arrow-right-left', iconColor: 'text-red-500 dark:text-red-400', color: 'hover:border-red-500', accept: '.pdf', multiple: false },
            { id: 'eliminar', title: 'Eliminar Páginas', description: 'Borra hojas específicas de tu documento.', icon: 'file-minus-2', iconColor: 'text-rose-500 dark:text-rose-400', color: 'hover:border-rose-500', accept: '.pdf', multiple: false },
            { id: 'numerar', title: 'Numerar Páginas', description: 'Agrega números de página al pie del documento.', icon: 'hash', iconColor: 'text-indigo-500 dark:text-indigo-400', color: 'hover:border-indigo-500', accept: '.pdf', multiple: false }
        ];

        let state = {
            activeTool: null, files: [], filePreviews: [], fileRotations: [], isDragging: false, processingState: 'idle', errorMessage: '',
            downloadUrl: null, downloadName: '', selectedExportFormat: 'docx', splitRange: '', compressionLevel: '50',
            isTermsModalOpen: false, isSugerenciasOpen: false, sugerenciaStatus: 'idle'
        };

        // --- STREAMING_CHUNK: Core Rendering ---
        function render() {
            const app = document.getElementById('app');
            const isDark = document.documentElement.classList.contains('dark');
            let html = '';

            html += `
                <nav class="glass-nav sticky top-0 z-40 border-b border-slate-200 dark:border-slate-800 transition-colors duration-300">
                    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                        <div class="flex items-center gap-2 cursor-pointer" id="nav-logo">
                            <i data-lucide="file-text" class="w-8 h-8 text-blue-600 dark:text-blue-500"></i>
                            <span class="text-xl font-bold tracking-tight text-slate-800 dark:text-white">Arvelo Maestro PDF</span>
                        </div>
                        
                        <div class="flex items-center gap-4">
                            <div class="hidden md:flex items-center gap-1.5 px-3 py-1 bg-green-50 dark:bg-green-900/30 text-green-700 dark:text-green-400 rounded-full text-xs font-bold border border-green-200 dark:border-green-800/50" title="Procesamiento 100% en tu navegador">
                                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                <span style="color: ${isDark ? '#39ff14' : ''}; text-shadow: ${isDark ? '0 0 5px rgba(57, 255, 20, 0.3)' : 'none'};">Privacidad Absoluta</span>
                            </div>

                            ${state.activeTool ? `
                            <button id="back-btn" class="flex items-center gap-2 text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors">
                                <i data-lucide="arrow-left" class="w-4 h-4 pointer-events-none"></i> <span class="hidden sm:inline">Volver</span>
                            </button>
                            ` : ''}

                            <a href="https://ko-fi.com/jesusarvelo/tip" target="_blank" class="hidden sm:flex items-center gap-2 px-4 py-2 bg-[#FF5E5B] hover:bg-[#ff4542] text-white font-bold rounded-full transition-all shadow-sm">
                                Donaciones <i data-lucide="coffee" class="w-4 h-4 pointer-events-none"></i>
                            </a>
                            
                            <button id="theme-toggle" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                                <i data-lucide="${isDark ? 'sun' : 'moon'}" class="w-5 h-5 pointer-events-none"></i>
                            </button>
                        </div>
                    </div>
                </nav>
            `;

            html += '<main class="flex-grow pt-8 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto w-full">';
            if (!state.activeTool) { html += renderHome(); } else { html += renderWorkspace(); }
            html += '</main>';

            html += `
                <footer class="mt-auto border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 pt-8 pb-8 text-center transition-colors">
                    <div class="flex flex-col md:flex-row items-center justify-between max-w-6xl mx-auto px-4">
                        <div class="flex flex-col items-start mb-4 md:mb-0">
                            <p class="text-slate-600 dark:text-slate-400 font-medium flex items-center gap-1 mb-1">
                                🇻🇪 Creado por Jesús Arvelo
                            </p>
                            <span class="text-xs text-slate-400 font-bold tracking-widest">(V. 1.0.1)</span>
                        </div>
                        <div class="flex flex-col items-end">
                            <p class="text-sm text-slate-500 dark:text-slate-400 mb-2">© ${new Date().getFullYear()} Todos los derechos reservados.</p>
                            <button id="open-terms-btn" class="text-sm text-blue-600 dark:text-blue-400 hover:underline transition-colors">
                                Términos y Condiciones de Uso
                            </button>
                        </div>
                    </div>
                </footer>
            `;

            if (state.isTermsModalOpen) html += renderTermsModal();
            if (state.isSugerenciasOpen) html += renderSugerenciasModal();

            if (!state.isSugerenciasOpen) {
                html += `
                <button id="open-sug-btn" class="fixed bottom-6 right-6 bg-slate-900 dark:bg-blue-600 hover:scale-105 text-white p-4 rounded-full shadow-lg hover:shadow-2xl transition-all duration-300 z-30 group flex items-center gap-2" title="Enviar sugerencia">
                    <i data-lucide="message-square" class="w-6 h-6 pointer-events-none"></i>
                    <span class="max-w-0 overflow-hidden whitespace-nowrap group-hover:max-w-xs transition-all duration-300 ease-in-out font-medium pointer-events-none">
                        &nbsp;Sugerencias
                    </span>
                </button>
                `;
            }

            app.innerHTML = html;
            lucide.createIcons();
            attachListeners();
        }

        // --- STREAMING_CHUNK: Views ---
        function renderHome() {
            let cardsHtml = TOOLS.map(tool => `
                <div data-id="${tool.id}" class="tool-card flex flex-col h-full bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-100 dark:border-slate-700 cursor-pointer transition-all duration-200 shadow-sm hover:shadow-xl hover:-translate-y-1 ${tool.color}">
                    <div class="bg-slate-50 dark:bg-slate-900/50 w-16 h-16 rounded-2xl flex items-center justify-center mb-4 transition-colors group-hover:scale-110">
                        <i data-lucide="${tool.icon}" class="w-8 h-8 ${tool.iconColor}"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 dark:text-white mb-2 transition-colors">${tool.title}</h3>
                    <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed transition-colors flex-grow">${tool.description}</p>
                </div>
            `).join('');

            return `
                <div class="text-center max-w-2xl mx-auto mb-12">
                    <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 dark:text-white tracking-tight mb-4 transition-colors">
                        La solución definitiva para tus <span class="text-blue-600 dark:text-blue-500">PDFs</span>
                    </h1>
                    <p class="text-lg text-slate-600 dark:text-slate-400 transition-colors">
                        Herramientas profesionales, gratuitas y seguras. Todo el procesamiento se realiza en tu dispositivo.
                    </p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 items-stretch mb-12">
                    ${cardsHtml}
                </div>
            `;
        }

        function renderWorkspace() {
            const tool = state.activeTool;
            let workspaceContent = '';

            if (state.processingState === 'idle') {
                workspaceContent = `
                    <div class="p-8 text-center">
                        <div id="dropzone" class="border-3 border-dashed rounded-2xl p-10 cursor-pointer transition-all min-h-[250px] flex flex-col items-center justify-center ${state.isDragging ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/20' : 'border-slate-300 dark:border-slate-600 hover:border-slate-400 dark:hover:border-slate-500 bg-slate-50 dark:bg-slate-800/50'}">
                            <input type="file" id="file-input" class="hidden" accept="${tool.accept}" ${tool.multiple ? 'multiple' : ''} />
                            <i data-lucide="upload-cloud" class="w-12 h-12 mb-4 ${state.isDragging ? 'text-blue-500' : 'text-slate-400 dark:text-slate-500'}"></i>
                            <p class="text-lg font-bold text-slate-700 dark:text-slate-200 mb-2 transition-colors">Haz clic o arrastra tus archivos aquí</p>
                            <p class="text-sm text-slate-500 dark:text-slate-400 mt-2 transition-colors">Formatos soportados: ${tool.accept}</p>
                            <p class="text-xs text-slate-400 dark:text-slate-500 mt-1 transition-colors">Límite de seguridad: 101 MB por archivo</p>
                        </div>

                        ${state.files.length > 0 ? `
                        <div class="mt-8 text-left">
                            <h4 class="font-semibold text-slate-700 dark:text-slate-300 mb-4 transition-colors">Archivos listos para procesar:</h4>
                            <ul class="space-y-3 mb-6">
                                ${state.files.map((file, idx) => `
                                <li class="flex items-center justify-between bg-slate-50 dark:bg-slate-800 p-3 rounded-xl border border-slate-100 dark:border-slate-700 transition-colors">
                                    <div class="flex items-center gap-3 overflow-hidden">
                                        ${state.filePreviews[idx] === 'loading'
                                            ? `<div class="w-12 h-12 flex-shrink-0 bg-slate-200 dark:bg-slate-700 rounded overflow-hidden flex items-center justify-center"><i data-lucide="loader-2" class="w-5 h-5 text-blue-500 animate-spin"></i></div>`
                                            : state.filePreviews[idx] 
                                                ? `<div class="w-12 h-12 flex-shrink-0 bg-slate-200 dark:bg-slate-700 rounded overflow-hidden flex items-center justify-center border border-slate-300 dark:border-slate-600"><img src="${state.filePreviews[idx]}" class="max-w-full max-h-full object-contain" style="transform: rotate(${state.fileRotations[idx]}deg); transition: transform 0.3s ease;" /></div>`
                                                : `<div class="w-12 h-12 flex-shrink-0 flex items-center justify-center transition-transform duration-300" style="transform: rotate(${state.fileRotations[idx]}deg);"><i data-lucide="file-text" class="w-8 h-8 text-slate-400 dark:text-slate-500"></i></div>`
                                        }
                                        <div class="flex flex-col">
                                            <span class="font-medium text-sm text-slate-700 dark:text-slate-200 truncate transition-colors max-w-[150px] sm:max-w-xs">${file.name}</span>
                                            <span class="text-xs text-slate-400 dark:text-slate-500 transition-colors">(${(file.size / 1024 / 1024).toFixed(2)} MB)</span>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        ${(state.filePreviews[idx] || file.type === 'application/pdf' || file.name.endsWith('.pdf')) ? `
                                        <button data-rotate="${idx}" class="rotate-file-btn text-blue-500 hover:text-blue-600 transition-colors p-2 bg-blue-50 dark:bg-blue-900/30 rounded-lg hover:bg-blue-100 dark:hover:bg-blue-800/50" title="Girar documento">
                                            <i data-lucide="rotate-cw" class="w-4 h-4 pointer-events-none"></i>
                                        </button>` : ''}
                                        <button data-index="${idx}" class="remove-file-btn text-red-400 hover:text-red-500 transition-colors p-2 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-lg" title="Eliminar archivo">
                                            <i data-lucide="x" class="w-5 h-5 pointer-events-none"></i>
                                        </button>
                                    </div>
                                </li>
                                `).join('')}
                            </ul>

                            ${tool.id === 'from-pdf' ? `
                            <div class="mt-6 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Convertir a:</label>
                                <select id="export-format" class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-lg p-2.5 outline-none focus:border-blue-500">
                                    <option value="docx" ${state.selectedExportFormat === 'docx' ? 'selected' : ''}>Microsoft Word (.docx)</option>
                                    <option value="xlsx" ${state.selectedExportFormat === 'xlsx' ? 'selected' : ''}>Microsoft Excel (.xlsx)</option>
                                    <option value="jpg" ${state.selectedExportFormat === 'jpg' ? 'selected' : ''}>Imagen JPEG (.jpg)</option>
                                    <option value="png" ${state.selectedExportFormat === 'png' ? 'selected' : ''}>Imagen PNG (.png)</option>
                                </select>
                            </div>` : ''}

                            ${(tool.id === 'split' || tool.id === 'eliminar') ? `
                            <div class="mt-6 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Páginas a procesar (ej. 1, 3, 5-8):</label>
                                <input type="text" id="split-range" value="${state.splitRange}" placeholder="Ej: 1, 3, 5-8" class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-lg p-2.5 outline-none focus:border-blue-500">
                                <p class="text-xs text-slate-500 mt-2">${tool.id === 'split' ? 'Si extraes varias páginas, se descargarán en un archivo .ZIP' : 'Las páginas indicadas serán borradas del documento final.'}</p>
                            </div>` : ''}
                            
                            ${tool.id === 'compress' ? `
                            <div class="mt-6 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Nivel de compresión:</label>
                                <select id="compression-level" class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-lg p-2.5 outline-none focus:border-blue-500">
                                    <option value="25" ${state.compressionLevel === '25' ? 'selected' : ''}>25% - Calidad Excelente (Menos compresión)</option>
                                    <option value="50" ${state.compressionLevel === '50' ? 'selected' : ''}>50% - Calidad Media (Equilibrio ideal)</option>
                                    <option value="75" ${state.compressionLevel === '75' ? 'selected' : ''}>75% - Calidad Básica (Mayor compresión)</option>
                                </select>
                            </div>` : ''}

                            <div class="mt-8">
                                <button id="process-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all shadow-md">
                                    Procesar Archivos <i data-lucide="play" class="w-5 h-5 pointer-events-none"></i>
                                </button>
                            </div>
                        </div>
                        ` : ''}
                    </div>
                `;
            } else if (state.processingState === 'processing') {
                workspaceContent = `
                    <div class="p-16 text-center">
                        <div class="loader mx-auto mb-6 border-blue-200 border-t-blue-600 w-16 h-16 border-4"></div>
                        <h3 class="text-2xl font-bold text-slate-800 dark:text-white mb-4">Procesando...</h3>
                        <div class="max-w-md mx-auto">
                            <div class="flex justify-between text-sm font-semibold mb-2 dark:text-slate-300">
                                <span>Progreso</span><span id="progress-text">0%</span>
                            </div>
                            <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-3 overflow-hidden">
                                <div id="progress-bar" class="bg-blue-600 h-full transition-all duration-300 ease-out" style="width: 0%"></div>
                            </div>
                        </div>
                        <p class="text-slate-500 text-sm mt-6">Por favor, no cierres esta ventana.</p>
                    </div>
                `;
            } else if (state.processingState === 'done') {
                workspaceContent = `
                    <div class="p-16 text-center">
                        <div class="w-20 h-20 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i data-lucide="check-circle-2" class="w-10 h-10 text-green-600 dark:text-green-500"></i>
                        </div>
                        <h3 class="text-3xl font-bold text-slate-800 dark:text-white mb-4">¡Completado!</h3>
                        <p class="text-slate-600 dark:text-slate-400 mb-8 max-w-md mx-auto">Tus archivos han sido procesados y están listos.</p>
                        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                            <a href="${state.downloadUrl}" download="${state.downloadName}" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-xl flex items-center justify-center gap-2 shadow-md w-full sm:w-auto">
                                <i data-lucide="download" class="w-5 h-5 pointer-events-none"></i> Descargar
                            </a>
                            <button id="reset-btn" class="bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold py-4 px-8 rounded-xl transition-colors w-full sm:w-auto">
                                Hacer otra tarea
                            </button>
                        </div>
                    </div>
                `;
            } else if (state.processingState === 'error') {
                workspaceContent = `
                    <div class="p-16 text-center">
                        <div class="w-20 h-20 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i data-lucide="alert-circle" class="w-10 h-10 text-red-600 dark:text-red-500"></i>
                        </div>
                        <h3 class="text-2xl font-bold text-slate-800 dark:text-white mb-4">Ocurrió un problema</h3>
                        <p class="text-red-500 dark:text-red-400 mb-8 max-w-md mx-auto bg-red-50 dark:bg-red-900/20 p-4 rounded-lg border border-red-100 dark:border-red-800 break-words">
                            ${state.errorMessage}
                        </p>
                        <button id="reset-btn-err" class="bg-slate-900 dark:bg-slate-700 text-white font-bold py-3 px-8 rounded-xl">
                            Intentar nuevamente
                        </button>
                    </div>
                `;
            }
            return `
                <div class="max-w-3xl mx-auto">
                    <div class="text-center mb-8">
                        <div class="w-16 h-16 bg-blue-50 dark:bg-slate-800 rounded-2xl flex items-center justify-center mx-auto mb-4 text-blue-600">
                            <i data-lucide="${tool.icon}" class="w-8 h-8"></i>
                        </div>
                        <h2 class="text-3xl font-bold text-slate-800 dark:text-white mb-2">${tool.title}</h2>
                        <p class="text-slate-500 dark:text-slate-400">${tool.description}</p>
                    </div>

        // --- STREAMING_CHUNK: Event Listeners ---
        function attachListeners() {
            const app = document.getElementById('app');
            const newApp = app.cloneNode(true);
            app.parentNode.replaceChild(newApp, app);

            newApp.addEventListener('click', (e) => {
                if (e.target.closest('#nav-logo') || e.target.closest('#back-btn')) { state.activeTool = null; resetWorkspace(); }
                else if (e.target.closest('#theme-toggle')) {
                    document.documentElement.classList.toggle('dark');
                    localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
                    render();
                }
                else if (e.target.closest('.tool-card')) {
                    const card = e.target.closest('.tool-card');
                    state.activeTool = TOOLS.find(t => t.id === card.dataset.id);
                    resetWorkspace();
                }
                else if (e.target.closest('#dropzone') || e.target.closest('#select-files-btn')) { document.getElementById('file-input').click(); }
                else if (e.target.closest('.remove-file-btn')) {
                    const idx = parseInt(e.target.closest('.remove-file-btn').dataset.index);
                    state.files.splice(idx, 1); state.filePreviews.splice(idx, 1); state.fileRotations.splice(idx, 1); render();
                }
                else if (e.target.closest('.rotate-file-btn')) {
                    const idx = parseInt(e.target.closest('.rotate-file-btn').dataset.rotate);
                    state.fileRotations[idx] = (state.fileRotations[idx] + 90) % 360; render();
                }
                else if (e.target.closest('#process-btn')) { processFiles(); }
                else if (e.target.closest('#reset-btn') || e.target.closest('#reset-btn-err')) { resetWorkspace(); }
                else if (e.target.closest('#open-terms-btn')) { state.isTermsModalOpen = true; render(); }
                else if (e.target.closest('#close-terms-btn') || e.target.closest('#close-terms-x') || e.target.id === 'terms-modal-overlay') { state.isTermsModalOpen = false; render(); }
                else if (e.target.closest('#open-sug-btn')) { state.isSugerenciasOpen = true; state.sugerenciaStatus = 'idle'; render(); }
                else if (e.target.closest('#close-sug-x') || e.target.id === 'sug-modal-overlay') { state.isSugerenciasOpen = false; render(); }
            });

            newApp.addEventListener('dragover', (e) => { e.preventDefault(); if(state.activeTool && !state.isDragging) { state.isDragging = true; render(); } });
            newApp.addEventListener('dragleave', (e) => { e.preventDefault(); if(e.relatedTarget === null && state.activeTool) { state.isDragging = false; render(); } });
            newApp.addEventListener('drop', (e) => { e.preventDefault(); if(state.activeTool) { state.isDragging = false; if (e.dataTransfer.files.length > 0) handleFiles(Array.from(e.dataTransfer.files)); } });

            const fileInput = document.getElementById('file-input');
            if(fileInput) fileInput.addEventListener('change', (e) => handleFiles(Array.from(e.target.files)));

            const formatSelect = document.getElementById('export-format');
            if(formatSelect) formatSelect.addEventListener('change', (e) => state.selectedExportFormat = e.target.value);

            const splitRangeInput = document.getElementById('split-range');
            if(splitRangeInput) splitRangeInput.addEventListener('input', (e) => state.splitRange = e.target.value);

            const compressionSelect = document.getElementById('compression-level');
            if(compressionSelect) compressionSelect.addEventListener('change', (e) => state.compressionLevel = e.target.value);

            const sugForm = document.getElementById('sug-form');
            if (sugForm) {
                sugForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const msg = document.getElementById('sug-mensaje').value;
                    const email = document.getElementById('sug-correo').value;
                    
                    if (msg.trim()) {
                        state.sugerenciaStatus = 'sending'; render();
                        const formData = new URLSearchParams(); formData.append('mensaje', msg); formData.append('correo', email);
                        fetch(URL_SUGERENCIAS, { method: 'POST', mode: 'no-cors', body: formData })
                        .then(() => { state.sugerenciaStatus = 'success'; render(); setTimeout(() => { state.isSugerenciasOpen = false; render(); }, 2500); showToast("Sugerencia enviada."); })
                        .catch(() => { state.sugerenciaStatus = 'idle'; render(); showToast("Error de conexión.", "error"); });
                    }
                });
            }
        }

        // --- STREAMING_CHUNK: Handlers & Helpers ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl shadow-2xl text-white text-sm font-medium flex items-center gap-3 toast-enter pointer-events-auto ${type === 'success' ? 'bg-slate-800 dark:bg-slate-700 border-l-4 border-green-500' : 'bg-red-600'}`;
            toast.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle-2' : 'alert-circle'}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.classList.replace('toast-enter', 'toast-exit'); setTimeout(() => toast.remove(), 400); }, 4000);
        }

        const yieldToMain = () => new Promise(resolve => setTimeout(resolve, 0));

        function updateProgress(percent) {
            const bar = document.getElementById('progress-bar');
            const text = document.getElementById('progress-text');
            if (bar) bar.style.width = `${percent}%`;
            if (text) text.innerText = `${percent}%`;
        }

        async function handleFiles(newFiles) {
            let validFiles = [];
            for (let f of newFiles) {
                if (f.size > MAX_FILE_SIZE) { showToast(`"${f.name}" supera el límite de 101 MB.`, 'error'); continue; }
                validFiles.push(f);
            }
            if(validFiles.length === 0) return;

            let addedFiles = validFiles;
            if (!state.activeTool.multiple) addedFiles = [validFiles[0]];

            const startIdx = state.activeTool.multiple ? state.files.length : 0;
            
            if (state.activeTool.multiple) {
                state.files = [...state.files, ...addedFiles];
                state.filePreviews = [...state.filePreviews, ...new Array(addedFiles.length).fill('loading')];
                state.fileRotations = [...state.fileRotations, ...new Array(addedFiles.length).fill(0)];
            } else {
                state.files = [addedFiles[0]]; state.filePreviews = ['loading']; state.fileRotations = [0];
            }
            render();

            for (let i = 0; i < addedFiles.length; i++) {
                const file = addedFiles[i];
                const realIdx = startIdx + i;
                
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => { state.filePreviews[realIdx] = e.target.result; render(); };
                    reader.readAsDataURL(file);
                } else if (file.type === 'application/pdf' && window.pdfjsLib) {
                    try {
                        const buffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
                        const page = await pdf.getPage(1);
                        const viewport = page.getViewport({scale: 0.5});
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = viewport.width; canvas.height = viewport.height;
                        await page.render({canvasContext: ctx, viewport: viewport}).promise;
                        state.filePreviews[realIdx] = canvas.toDataURL('image/jpeg');
                        canvas.width = 0; 
                    } catch(e) { state.filePreviews[realIdx] = null; }
                    render();
                } else { state.filePreviews[realIdx] = null; render(); }
            }
        }

        function resetWorkspace() {
            state.files = []; state.filePreviews = []; state.fileRotations = [];
            state.processingState = 'idle'; state.downloadUrl = null; state.downloadName = ''; state.errorMessage = '';
            render();
        }

        function createDownload(data, filename, type) {
            const blob = new Blob([data], { type: type });
            state.downloadUrl = URL.createObjectURL(blob);
            state.downloadName = filename;
            state.processingState = 'done';
            render();
            showToast("¡Archivo procesado con éxito!");
        }

        function parsePageRange(rangeStr, maxPages) {
            const indices = new Set();
            if (!rangeStr.trim()) return [];
            const parts = rangeStr.split(',');
            for (let part of parts) {
                part = part.trim();
                if (part.includes('-')) {
                    const [startStr, endStr] = part.split('-');
                    let start = parseInt(startStr), end = parseInt(endStr);
                    if (!isNaN(start) && !isNaN(end)) {
                        start = Math.max(1, start); end = Math.min(maxPages, end);
                        for (let i = start; i <= end; i++) indices.add(i - 1);
                    }
                } else {
                    const num = parseInt(part);
                    if (!isNaN(num) && num >= 1 && num <= maxPages) indices.add(num - 1);
                }
            }
            return Array.from(indices).sort((a, b) => a - b);
        }

        // --- STREAMING_CHUNK: Core Processing Engine ---
        async function processFiles() {
            if (state.files.length === 0) return;
            state.processingState = 'processing';
            render();
            await yieldToMain(); 

            try {
                if (state.activeTool.id === 'merge') await processMerge();
                else if (state.activeTool.id === 'split') await processSplit();
                else if (state.activeTool.id === 'compress') await processCompress();
                else if (state.activeTool.id === 'to-pdf') await processCreatePdf();
                else if (state.activeTool.id === 'from-pdf') await processFromPdf();
                else if (state.activeTool.id === 'eliminar') await processEliminar();
                else if (state.activeTool.id === 'numerar') await processNumerar();
            } catch (error) {
                console.error(error);
                state.errorMessage = error.message || 'Error al procesar el archivo.';
                state.processingState = 'error';
                render();
            }
        }

        async function processMerge() {
            const { PDFDocument, degrees } = window.PDFLib;
            const mergedPdf = await PDFDocument.create();
            const total = state.files.length;

            for (let i = 0; i < total; i++) {
                const file = state.files[i];
                const angle = state.fileRotations[i] || 0;
                const buffer = await file.arrayBuffer();
                
                if (file.type === 'application/pdf') {
                    const pdf = await PDFDocument.load(buffer);
                    const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    pages.forEach((p) => {
                        if (angle !== 0) p.setRotation(degrees((p.getRotation().angle + angle) % 360));
                        mergedPdf.addPage(p);
                    });
                } else if (file.type.startsWith('image/')) {
                    let image = file.type === 'image/png' ? await mergedPdf.embedPng(buffer) : await mergedPdf.embedJpg(buffer);
                    let page = mergedPdf.addPage([image.width, image.height]);
                    page.drawImage(image, { x: 0, y: 0, width: image.width, height: image.height });
                    if (angle !== 0) page.setRotation(degrees(angle));
                }
                updateProgress(Math.round(((i + 1) / total) * 90));
                await yieldToMain();
            }
            updateProgress(100); await yieldToMain();
            createDownload(await mergedPdf.save(), 'Arvelo_Unido.pdf', 'application/pdf');
        }

        async function processSplit() {
            const { PDFDocument } = window.PDFLib;
            const file = state.files[0];
            const originalPdf = await PDFDocument.load(await file.arrayBuffer());
            const pagesToExtract = parsePageRange(state.splitRange, originalPdf.getPageCount());
            if (pagesToExtract.length === 0) throw new Error("Rango inválido.");

            if (pagesToExtract.length === 1) {
                const newPdf = await PDFDocument.create();
                const [copied] = await newPdf.copyPages(originalPdf, [pagesToExtract[0]]);
                newPdf.addPage(copied);
                updateProgress(100); await yieldToMain();
                createDownload(await newPdf.save(), `Pagina_${pagesToExtract[0] + 1}.pdf`, 'application/pdf');
            } else {
                if (!window.JSZip) throw new Error("ZIP no disponible.");
                const zip = new JSZip();
                for (let i = 0; i < pagesToExtract.length; i++) {
                    const pIdx = pagesToExtract[i];
                    const singlePdf = await PDFDocument.create();
                    const [copied] = await singlePdf.copyPages(originalPdf, [pIdx]);
                    singlePdf.addPage(copied);
                    zip.file(`Pagina_${pIdx + 1}.pdf`, await singlePdf.save());
                    updateProgress(Math.round(((i + 1) / pagesToExtract.length) * 80));
                    await yieldToMain();
                }
                updateProgress(95); await yieldToMain();
                state.downloadUrl = URL.createObjectURL(await zip.generateAsync({type:"blob"}));
                state.downloadName = `Arvelo_Separados.zip`;
                state.processingState = 'done';
                render(); showToast("ZIP generado.");
            }
        }

        async function processEliminar() {
            const { PDFDocument } = window.PDFLib;
            const file = state.files[0];
            const pdf = await PDFDocument.load(await file.arrayBuffer());
            const total = pdf.getPageCount();
            const toDelete = parsePageRange(state.splitRange, total).sort((a,b) => b - a); 
            if (toDelete.length === 0 || toDelete.length === total) throw new Error("Rango inválido.");
            
            for(let i=0; i < toDelete.length; i++){
                pdf.removePage(toDelete[i]);
                updateProgress(Math.round(((i+1)/toDelete.length)*90));
                await yieldToMain();
            }
            updateProgress(100); await yieldToMain();
            createDownload(await pdf.save(), `Arvelo_Editado.pdf`, 'application/pdf');
        }

        async function processNumerar() {
            const { PDFDocument, rgb } = window.PDFLib;
            const file = state.files[0];
            const pdf = await PDFDocument.load(await file.arrayBuffer());
            const pages = pdf.getPages();
            
            for (let i = 0; i < pages.length; i++) {
                const p = pages[i];
                const { width } = p.getSize();
                p.drawText(`- ${i + 1} -`, { x: width / 2 - 10, y: 20, size: 12, color: rgb(0,0,0) });
                updateProgress(Math.round(((i+1)/pages.length)*90));
                await yieldToMain();
            }
            updateProgress(100); await yieldToMain();
            createDownload(await pdf.save(), `Arvelo_Numerado.pdf`, 'application/pdf');
        }

        async function processCompress() {
            const file = state.files[0];
            const level = parseInt(state.compressionLevel);
            if (!window.pdfjsLib) throw new Error("Motor no disponible.");

            const pdfDoc = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
            const { PDFDocument } = window.PDFLib;
            const newPdf = await PDFDocument.create();

            let imgQuality = level === 25 ? 0.8 : (level === 75 ? 0.3 : 0.5);

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 }); 
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
                
                const newImg = await newPdf.embedJpg(canvas.toDataURL('image/jpeg', imgQuality));
                const newPage = newPdf.addPage([newImg.width, newImg.height]);
                newPage.drawImage(newImg, { x: 0, y: 0, width: newImg.width, height: newImg.height });
                
                canvas.width = 0; canvas.height = 0;
                updateProgress(Math.round((i / pdfDoc.numPages) * 90));
                await yieldToMain();
            }
            updateProgress(100); await yieldToMain();
            createDownload(await newPdf.save(), `Arvelo_Comprimido.pdf`, 'application/pdf');
        }

        async function processCreatePdf() {
            const { PDFDocument, StandardFonts, rgb, degrees } = window.PDFLib;
            const newPdf = await PDFDocument.create();
            const font = await newPdf.embedFont(StandardFonts.Helvetica);

            for (let i = 0; i < state.files.length; i++) {
                const file = state.files[i];
                const angle = state.fileRotations[i] || 0;
                const buffer = await file.arrayBuffer();
                const ext = file.name.split('.').pop().toLowerCase();

                if (ext === 'txt') {
                    const text = new TextDecoder("utf-8").decode(buffer);
                    let page = newPdf.addPage();
                    let { height } = page.getSize();
                    let yPos = height - 50;

                    for (const line of text.split('\n')) {
                        if (yPos < 50) { page = newPdf.addPage(); yPos = height - 50; }
                        try { page.drawText(line.replace(/\r/g, ''), { x: 50, y: yPos, size: 12, font, color: rgb(0,0,0) }); } catch(e) {}
                        yPos -= 15;
                    }
                } else if (['jpg', 'jpeg', 'png'].includes(ext)) {
                    let img = ext === 'png' ? await newPdf.embedPng(buffer) : await newPdf.embedJpg(buffer);
                    let page = newPdf.addPage([img.width, img.height]);
                    page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
                    if (angle !== 0) page.setRotation(degrees(angle));
                }
                updateProgress(Math.round(((i + 1) / state.files.length) * 90));
                await yieldToMain();
            }
            updateProgress(100); await yieldToMain();
            createDownload(await newPdf.save(), 'Arvelo_Creado.pdf', 'application/pdf');
        }

        async function processFromPdf() {
            const file = state.files[0];
            const format = state.selectedExportFormat;
            if (!window.pdfjsLib) throw new Error("Motor no disponible.");

            const pdfDoc = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;

            if (format === 'jpg' || format === 'png') {
                const page = await pdfDoc.getPage(1);
                const viewport = page.getViewport({ scale: 2.0 }); 
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                
                const mimeType = format === 'png' ? 'image/png' : 'image/jpeg';
                const imgBytes = await (await fetch(canvas.toDataURL(mimeType, 1.0))).arrayBuffer();
                updateProgress(100); await yieldToMain();
                createDownload(imgBytes, `Arvelo_Imagen.${format}`, mimeType);
            } else {
                let fullTextHtml = "", fullTextExcel = "";
                for (let i = 1; i <= pdfDoc.numPages; i++) {
                    const pageText = (await (await pdfDoc.getPage(i)).getTextContent()).items.map(t => t.str).join(' ');
                    fullTextHtml += `<p>${pageText}</p>`;
                    fullTextExcel += `<tr><td><b>Página ${i}</b></td><td>${pageText}</td></tr>`;
                    updateProgress(Math.round((i / pdfDoc.numPages) * 80));
                    await yieldToMain();
                }

                let content = format === 'docx' 
                    ? `<html xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"></head><body><h1>${file.name}</h1><hr>${fullTextHtml}</body></html>`
                    : `<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"></head><body><table border="1"><tr><th colspan="2" style="background-color:#4CAF50;color:white;">${file.name}</th></tr>${fullTextExcel}</table></body></html>`;
                
                updateProgress(100); await yieldToMain();
                createDownload(content, `Arvelo_Convertido.${format === 'docx' ? 'doc' : 'xls'}`, format === 'docx' ? 'application/msword' : 'application/vnd.ms-excel');
            }
        }

        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
