<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyect PDF</title>
    <link rel="canonical" href="https://jesusarvelo-afk.github.io/maestropdf/">
    <link rel="icon" href="favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/docx-preview@latest/dist/docx-preview.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin 2s linear infinite; }
        body, nav, .tool-card, #dropzone { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-900 flex flex-col font-sans text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <div id="app" class="flex flex-col flex-grow"></div>

    <script>
        const TOOLS = [
            { id: 'merge', title: 'Unir PDF', description: 'Une varios archivos (PDF o Imágenes) en un solo documento PDF.', icon: 'layers', iconColor: 'text-blue-500', color: 'hover:border-blue-500 hover:shadow-blue-100', accept: '.pdf, image/png, image/jpeg', multiple: true },
            { id: 'split', title: 'Dividir PDF', description: 'Extrae páginas específicas de tu documento PDF.', icon: 'scissors', iconColor: 'text-orange-500', color: 'hover:border-orange-500 hover:shadow-orange-100', accept: '.pdf', multiple: false },
            { id: 'compress', title: 'Comprimir PDF', description: 'Reduce el tamaño de tu PDF optimizando sus imágenes internas.', icon: 'minimize-2', iconColor: 'text-green-500', color: 'hover:border-green-500 hover:shadow-green-100', accept: '.pdf', multiple: false },
            { id: 'to-pdf', title: 'Crear PDF', description: 'Crea archivos PDF a partir de textos (.txt), Word, Excel o imágenes.', icon: 'file-plus-2', iconColor: 'text-purple-500', color: 'hover:border-purple-500 hover:shadow-purple-100', accept: '.txt, .docx, .xlsx, .jpg, .jpeg, .png', multiple: true },
            { id: 'scan', title: 'Escanear Documento', description: 'Usa tu cámara para tomar fotos de documentos y convertirlos en PDF.<br><span class="text-xs font-semibold text-emerald-600 mt-2 block">* Solo disponible en móviles y tablets.</span>', icon: 'camera', iconColor: 'text-emerald-500', color: 'hover:border-emerald-500 hover:shadow-emerald-100', accept: 'camera', multiple: true },
            { id: 'from-pdf', title: 'PDF a Formato', description: 'Convierte tus archivos PDF a formatos editables (Word/Excel) o imágenes.', icon: 'arrow-right-left', iconColor: 'text-red-500', color: 'hover:border-red-500 hover:shadow-red-100', accept: '.pdf', multiple: false },
            { id: 'remove-pages', title: 'Eliminar Páginas', description: 'Borra hojas específicas de un documento PDF.', icon: 'trash-2', iconColor: 'text-rose-500', color: 'hover:border-rose-500 hover:shadow-rose-100', accept: '.pdf', multiple: false },
            { id: 'number-pages', title: 'Numerar Páginas', description: 'Añade números de página a tu documento PDF.', icon: 'hash', iconColor: 'text-teal-500', color: 'hover:border-teal-500 hover:shadow-teal-100', accept: '.pdf', multiple: false },
            { id: 'convert-webp', title: 'Convertir WEBP', description: 'Cambia imágenes WEBP a formatos clásicos como JPG o PNG.', icon: 'image', iconColor: 'text-indigo-500', color: 'hover:border-indigo-500 hover:shadow-indigo-100', accept: '.webp, image/webp', multiple: false }
        ];

        let state = { activeTool: null, files: [], filePreviews: [], fileRotations: [], isDragging: false, processingState: 'idle', errorMessage: '', downloadUrl: null, downloadName: '', selectedExportFormat: 'doc', selectedImageFormat: 'jpg', splitRange: '', compressionLevel: '50', isTermsModalOpen: false, isContactOpen: false, cameraStream: null, scannedBlobs: [], scannedPreviews: [] };

        function render() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <nav class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm no-print">
                    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                        <div class="flex items-center gap-2 cursor-pointer" id="nav-logo">
                            <span class="text-xl font-bold tracking-tight text-slate-900">Proyect PDF</span>
                        </div>
                        <div class="flex items-center gap-4">
                            ${state.activeTool ? `<button id="back-btn" class="text-sm text-slate-600 hover:text-slate-900">Volver</button>` : ''}
                        </div>
                    </div>
                </nav>
                <main class="flex-grow flex flex-col">${!state.activeTool ? renderHome() : renderWorkspace()}</main>
                <footer class="border-t border-slate-200 bg-white mt-auto no-print">
                    <div class="max-w-6xl mx-auto px-4 py-8 flex flex-col md:flex-row items-center justify-between">
                        <div class="text-sm text-slate-500">
                            <span class="font-medium text-slate-700">🇻🇪 Desarrollado por Jesús Arvelo</span><br>
                            <span class="text-xs opacity-75">(V. 2.0) © 2026 Todos los derechos reservados.</span>
                        </div>
                        <button id="open-terms-btn" class="text-sm text-blue-600 hover:underline">Términos y Condiciones de Uso</button>
                    </div>
                </footer>
            `;
            if (state.isTermsModalOpen) app.insertAdjacentHTML('beforeend', renderTermsModal());
            attachListeners();
        }

        function renderTermsModal() {
            return `
                <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[85vh] flex flex-col overflow-hidden">
                        <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
                            <h2 class="text-xl font-bold text-slate-800">Términos y Condiciones de Uso</h2>
                            <button id="close-terms-btn" class="text-slate-500">✕</button>
                        </div>
                        <div class="p-6 overflow-y-auto text-slate-600 text-sm space-y-4 text-justify">
                            <p><strong>1. Aceptación de los Términos</strong><br>Al acceder y utilizar Proyect PDF, aceptas estos términos en su totalidad. Si no estás de acuerdo con alguna de las condiciones, te invitamos a no utilizar la herramienta.</p>
                            <p><strong>2. Uso del Servicio</strong><br>Esta herramienta ha sido creada con fines de utilidad personal, recreacional y su uso es libre. Como usuario, te comprometes a utilizarla de manera responsable y a no procesar documentos ilegales, fraudulentos o que violen normativas vigentes.</p>
                            <p><strong>3. Privacidad y Tratamiento de Archivos</strong><br>Sabemos lo importante que es la privacidad de tu información. Procesamiento temporal: Los documentos, fotografías y archivos que subas para comprimir, crear o convertir se procesan de manera temporal y estrictamente para cumplir con la tarea solicitada. Cero almacenamiento: No guardamos, leemos, compartimos, cedemos, ni nos apropiamos del contenido de ninguno de los archivos que proceses en esta plataforma.</p>
                            <p><strong>4. Propiedad Intelectual y Derechos de Autor</strong><br>Tus Archivos: Tú conservas el 100% de los derechos de autor y de propiedad intelectual sobre cualquier documento, imagen o texto que subas o generes a través de la herramienta. La Aplicación: Todo el código fuente, diseño, estructura, interfaz y el nombre de Proyect PDF son propiedad intelectual exclusiva de Jesús Arvelo. Queda estrictamente prohibida la copia, reproducción, modificación o distribución comercial del aplicativo sin autorización previa.</p>
                            <p><strong>5. Limitación de Responsabilidad</strong><br>La herramienta se ofrece "tal cual", como un proyecto de desarrollo continuo y que es creado de manera recreacional pero de igual forma tiene protección intelectual. No nos hacemos responsables por la pérdida accidental de datos, corrupción de archivos o el uso indebido que los usuarios le den a los documentos procesados. Recomendamos encarecidamente mantener siempre una copia de seguridad (backup) de tus archivos originales.</p>
                            <p><strong>6. Legislación Aplicable</strong><br>Estos términos y condiciones se rigen e interpretan de acuerdo con las leyes de la República Bolivariana de Venezuela.</p>
                        </div>
                    </div>
                </div>`;
        }

        function renderHome() {
            return `
                <div class="max-w-6xl mx-auto px-4 py-12">
                    <h1 class="text-4xl font-extrabold text-center mb-12">Proyect <span class="text-blue-600">PDF</span></h1>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        ${TOOLS.map(t => `<div data-id="${t.id}" class="tool-card p-6 border rounded-2xl cursor-pointer hover:bg-slate-50">${t.title}</div>`).join('')}
                    </div>
                </div>
            `;
        }

        function renderWorkspace() { return `<div class="p-8 max-w-4xl mx-auto">Cargando Herramienta...</div>`; }

        function attachListeners() {
            document.querySelectorAll('.tool-card').forEach(card => card.onclick = () => {
                state.activeTool = TOOLS.find(t => t.id === card.getAttribute('data-id'));
                render();
            });
            document.getElementById('open-terms-btn')?.onclick = () => { state.isTermsModalOpen = true; render(); };
            document.getElementById('close-terms-btn')?.onclick = () => { state.isTermsModalOpen = false; render(); };
            document.getElementById('nav-logo')?.onclick = () => { state.activeTool = null; render(); };
            document.getElementById('back-btn')?.onclick = () => { state.activeTool = null; render(); };
        }

        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
