<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Etiquetas SEO Básicas -->
    <title>Arvelo Maestro PDF</title>
    <meta name="description" content="Todas las herramientas que necesitas para trabajar con archivos PDF en un solo lugar. Une, divide, comprime y convierte gratis y sin perder calidad.">
    <meta name="keywords" content="pdf, editar pdf, unir pdf, dividir pdf, comprimir pdf, gratis">
    <meta name="author" content="Jesús Arvelo">

    <!-- Etiquetas Open Graph (Para WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Arvelo Maestro PDF | Herramientas Profesionales">
    <meta property="og:description" content="Une, divide, comprime y convierte tus PDFs gratis. Privacidad absoluta: todo se procesa en tu navegador.">
    <meta property="og:image" content="banner.jpg">

    <!-- Etiquetas Twitter (Para X) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Arvelo Maestro PDF">
    <meta name="twitter:description" content="Herramientas profesionales para PDF. Rápido, seguro y gratuito.">
    <meta name="twitter:image" content="banner.jpg">

    <!-- Favicon: Siglas AJJ minimalistas -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='32' height='32'%3E%3Crect width='24' height='24' rx='4' fill='%232563eb'/%3E%3Ctext x='12' y='17' font-family='sans-serif' font-size='9' font-weight='bold' fill='white' text-anchor='middle'%3EAJJ%3C/text%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <!-- Librerías de procesamiento -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin 2s linear infinite; }
        body, nav, .tool-card, #dropzone { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-900 flex flex-col font-sans text-slate-900 dark:text-slate-100 selection:bg-blue-200 dark:selection:bg-blue-900 transition-colors duration-300">

    <div id="app" class="flex flex-col flex-grow"></div>

    <script>
        // --- STREAMING_CHUNK: Initializing Dark Mode ---
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // --- STREAMING_CHUNK: Tools configuration ---
        const TOOLS = [
            { id: 'merge', title: 'Unir PDF', description: 'Une varios archivos en un solo documento PDF.', icon: 'layers', iconColor: 'text-blue-500 dark:text-blue-400', color: 'hover:border-blue-500 dark:hover:border-blue-400 hover:shadow-blue-100 dark:hover:shadow-blue-900/20', accept: '.pdf, image/png, image/jpeg', multiple: true },
            { id: 'split', title: 'Dividir PDF', description: 'Extrae páginas específicas de tu documento PDF.', icon: 'scissors', iconColor: 'text-orange-500 dark:text-orange-400', color: 'hover:border-orange-500 dark:hover:border-orange-400 hover:shadow-orange-100 dark:hover:shadow-orange-900/20', accept: '.pdf', multiple: false },
            { id: 'compress', title: 'Comprimir PDF', description: 'Reduce el tamaño de tu PDF optimizando sus imágenes.', icon: 'minimize-2', iconColor: 'text-green-500 dark:text-green-400', color: 'hover:border-green-500 dark:hover:border-green-400 hover:shadow-green-100 dark:hover:shadow-green-900/20', accept: '.pdf', multiple: false },
            { id: 'delete', title: 'Eliminar Páginas', description: 'Borra hojas específicas de tu PDF.', icon: 'file-minus', iconColor: 'text-rose-500 dark:text-rose-400', color: 'hover:border-rose-500 dark:hover:border-rose-400 hover:shadow-rose-100 dark:hover:shadow-rose-900/20', accept: '.pdf', multiple: false },
            { id: 'number', title: 'Numerar Páginas', description: 'Añade números de página a tu documento.', icon: 'list-ordered', iconColor: 'text-teal-500 dark:text-teal-400', color: 'hover:border-teal-500 dark:hover:border-teal-400 hover:shadow-teal-100 dark:hover:shadow-teal-900/20', accept: '.pdf', multiple: false },
            { id: 'to-pdf', title: 'Crear PDF', description: 'Crea archivos PDF a partir de textos (.txt) o imágenes.', icon: 'file-plus-2', iconColor: 'text-purple-500 dark:text-purple-400', color: 'hover:border-purple-500 dark:hover:border-purple-400 hover:shadow-purple-100 dark:hover:shadow-purple-900/20', accept: '.txt,.doc,.docx,.xls,.xlsx,.jpg,.png', multiple: true },
            { id: 'from-pdf', title: 'PDF a Word/Excel/JPG', description: 'Convierte archivos PDF a formatos editables o imágenes.', icon: 'arrow-right-left', iconColor: 'text-red-500 dark:text-red-400', color: 'hover:border-red-500 dark:hover:border-red-400 hover:shadow-red-100 dark:hover:shadow-red-900/20', accept: '.pdf', multiple: false }
        ];

        // --- STREAMING_CHUNK: State Management ---
        let state = {
            activeTool: null, files: [], filePreviews: [], fileRotations: [], isDragging: false,
            processingState: 'idle', errorMessage: '', downloadUrl: null, downloadName: '',
            selectedExportFormat: 'docx', splitRange: '', deleteRange: '', compressionLevel: '50', progress: 0,
            isTermsModalOpen: false, subscriptionStatus: 'idle', subscriptionEmail: ''
        };

        // --- STREAMING_CHUNK: UI Helpers (Toasts & Progress) ---
        function showToast(message, type = 'error') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = `px-4 py-3 rounded-xl shadow-xl text-white font-medium flex items-center gap-3 transform transition-all duration-300 translate-y-10 opacity-0 ${type === 'error' ? 'bg-red-600' : 'bg-slate-800 dark:bg-slate-700'}`;
            toast.innerHTML = `<i data-lucide="${type==='error'?'alert-circle':'info'}" class="w-5 h-5"></i><span>${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons({root: toast});
            
            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        function updateProgress(percent) {
            state.progress = percent;
            const bar = document.getElementById('progress-bar-fill');
            const text = document.getElementById('progress-text');
            if (bar) bar.style.width = `${percent}%`;
            if (text) text.innerText = `${percent}% Completado`;
        }

        const yieldThread = () => new Promise(resolve => setTimeout(resolve, 10));

        // --- STREAMING_CHUNK: Rendering App ---
        function render() {
            const app = document.getElementById('app');
            const isDark = document.documentElement.classList.contains('dark');
            let html = '';

            // Navbar
            html += `
                <nav class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-10 shadow-sm transition-colors duration-300">
                    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                        <div class="flex items-center gap-2 cursor-pointer" id="nav-logo">
                            <i data-lucide="file-text" class="w-8 h-8 text-blue-600 dark:text-blue-500"></i>
                            <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white hidden sm:block">Arvelo Maestro PDF</span>
                        </div>
                        <div class="flex items-center gap-3">
                            ${state.activeTool ? `
                            <button id="back-btn" class="flex items-center gap-2 text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors relative z-20">
                                <i data-lucide="arrow-left" class="w-4 h-4 pointer-events-none"></i> <span class="hidden sm:inline">Volver</span>
                            </button>
                            ` : ''}
                            
                            <!-- Botón Ko-Fi -->
                            <a href="https://ko-fi.com/jesusarvelo/tip" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center gap-2 px-3 py-1.5 rounded-full bg-rose-50 dark:bg-rose-900/20 text-rose-500 dark:text-rose-400 hover:bg-rose-100 dark:hover:bg-rose-900/40 transition-colors relative z-20" title="Apóyame en Ko-fi">
                                <span class="text-sm font-medium hidden sm:inline">Donaciones</span>
                                <i data-lucide="coffee" class="w-4 h-4 pointer-events-none"></i>
                            </a>

                            <button id="theme-toggle" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors relative z-20" aria-label="Cambiar tema">
                                <i data-lucide="${isDark ? 'sun' : 'moon'}" class="w-5 h-5 pointer-events-none"></i>
                            </button>
                        </div>
                    </div>
                </nav>
            `;

            html += '<main class="flex-grow flex flex-col">';
            if (!state.activeTool) html += renderHome();
            else html += renderWorkspace();
            html += '</main>';

            // Footer con Firma y Bandera
            html += `
                <footer class="border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 mt-auto transition-colors duration-300">
                    <div class="max-w-6xl mx-auto px-4 py-8 flex flex-col md:flex-row items-center justify-between text-center md:text-left gap-4">
                        <div class="flex flex-col items-center md:items-start">
                            <div class="flex items-center gap-2 text-slate-500 dark:text-slate-400 font-medium">
                                <span class="text-xl" title="Venezuela">🇻🇪</span> Creado por Jesús Arvelo
                            </div>
                            <span class="text-xs text-slate-400 dark:text-slate-500 mt-1">(V. 1.0.1)</span>
                        </div>
                        <div class="flex flex-col items-center md:items-end">
                            <p class="text-sm text-slate-500 dark:text-slate-400 mb-2">© ${new Date().getFullYear()} Arvelo Maestro PDF. Todos los derechos reservados.</p>
                            <button id="open-terms-btn" class="text-sm text-blue-600 dark:text-blue-400 hover:underline hover:text-blue-800 dark:hover:text-blue-300 transition-colors">
                                Términos y Condiciones de Uso
                            </button>
                        </div>
                    </div>
                </footer>
            `;

            if (state.isTermsModalOpen) html += renderTermsModal();

            app.innerHTML = html;
            lucide.createIcons();
            attachListeners();
        }

        // --- STREAMING_CHUNK: Home View ---
        function renderHome() {
            let cardsHtml = TOOLS.map(tool => `
                <div data-id="${tool.id}" class="tool-card flex flex-col h-full bg-white dark:bg-slate-800 p-6 rounded-2xl border-2 border-slate-100 dark:border-slate-700 cursor-pointer transition-all duration-200 shadow-sm hover:-translate-y-1 ${tool.color}">
                    <div class="bg-slate-50 dark:bg-slate-900/50 w-16 h-16 rounded-xl flex items-center justify-center mb-4 transition-colors">
                        <i data-lucide="${tool.icon}" class="w-8 h-8 ${tool.iconColor}"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 dark:text-white mb-2 transition-colors">${tool.title}</h3>
                    <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed transition-colors flex-grow">${tool.description}</p>
                </div>
            `).join('');

            return `
                <div class="max-w-6xl mx-auto px-4 py-12 flex-grow">
                    <div class="text-center mb-16">
                        <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 dark:text-white tracking-tight mb-4 transition-colors">
                            Arvelo Maestro <span class="text-blue-600 dark:text-blue-500">PDF</span>
                        </h1>
                        <p class="text-lg text-slate-600 dark:text-slate-400 max-w-2xl mx-auto transition-colors mb-6">
                            Todas las herramientas que necesitas para trabajar con archivos PDF en un solo lugar. Rápido, seguro y fácil de usar.
                        </p>
                        <!-- Insignia de Privacidad -->
                        <div class="inline-flex items-center gap-2 bg-green-50 dark:bg-slate-800 border border-green-200 dark:border-[#39ff14]/30 px-4 py-2 rounded-full shadow-sm">
                            <i data-lucide="lock" class="w-4 h-4 text-green-600 dark:text-[#39ff14]"></i>
                            <span class="text-sm font-semibold text-green-700 dark:text-[#39ff14] tracking-wide" style="text-shadow: 0 0 8px rgba(57, 255, 20, 0.1);">Privacidad Absoluta: Tus archivos nunca salen de tu ordenador</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 items-stretch mb-20">
                        ${cardsHtml}
                    </div>
                    
                    <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl p-8 md:p-12 text-center shadow-2xl relative overflow-hidden">
                        <div class="absolute top-0 right-0 -mr-8 -mt-8 w-40 h-40 rounded-full bg-white opacity-10"></div>
                        <div class="absolute bottom-0 left-0 -ml-8 -mb-8 w-24 h-24 rounded-full bg-white opacity-10"></div>
                        <div class="relative z-10 max-w-2xl mx-auto">
                            <span class="inline-block py-1 px-4 rounded-full bg-blue-500/30 text-blue-100 text-xs font-bold uppercase tracking-wider mb-4 border border-blue-400/30">Próximamente</span>
                            <h2 class="text-3xl md:text-4xl font-bold text-white mb-4">¡Lleva Maestro PDF en tu bolsillo!</h2>
                            <p class="text-blue-100 mb-8 text-lg">Déjanos tu correo para ser de los primeros en probar nuestra nueva <strong>App para Android</strong> y recibir futuras actualizaciones.</p>
                            ${state.subscriptionStatus === 'success' ? `
                                <div class="bg-white/10 border border-white/20 rounded-xl p-4 flex items-center justify-center gap-3 text-white max-w-md mx-auto backdrop-blur-sm"><i data-lucide="check-circle-2" class="w-6 h-6 text-green-400"></i><span class="font-medium">¡Gracias! Te hemos añadido a la lista.</span></div>
                            ` : `
                                <form id="subscribe-form" class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto relative">
                                    <div class="relative flex-grow">
                                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="mail" class="h-5 w-5 text-blue-200"></i></div>
                                        <input type="email" id="subscriber-email" required placeholder="tu@correo.com" class="w-full pl-10 pr-4 py-3 rounded-xl border border-white/20 focus:ring-2 focus:ring-white/50 bg-white/10 text-white placeholder-blue-200 outline-none backdrop-blur-sm transition-all shadow-inner" value="${state.subscriptionEmail}">
                                    </div>
                                    <button type="submit" class="bg-white text-blue-700 hover:bg-blue-50 font-bold py-3 px-6 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg min-w-[140px]">
                                        ${state.subscriptionStatus === 'subscribing' ? `<i data-lucide="loader-2" class="w-5 h-5 animate-spin-slow"></i>` : `Suscribirme <i data-lucide="send" class="w-4 h-4"></i>`}
                                    </button>
                                </form>
                            `}
                        </div>
                    </div>
                </div>
            `;
        }

        // --- STREAMING_CHUNK: Workspace View ---
        function renderWorkspace() {
            const tool = state.activeTool;
            let workspaceContent = '';

            if (state.processingState === 'idle') {
                workspaceContent = `
                    <div class="p-8">
                        <div id="dropzone" class="border-2 border-dashed rounded-2xl p-12 text-center transition-all duration-200 ${state.isDragging ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/20' : 'border-slate-300 dark:border-slate-600 hover:border-slate-400 bg-slate-50 dark:bg-slate-800/50'}">
                            <input type="file" id="file-input" class="hidden" accept="${tool.accept}" ${tool.multiple ? 'multiple' : ''} />
                            <div class="flex justify-center mb-4"><i data-lucide="upload-cloud" class="w-16 h-16 ${state.isDragging ? 'text-blue-500' : 'text-slate-400'}"></i></div>
                            <h3 class="text-xl font-semibold text-slate-700 dark:text-slate-200 mb-2">Arrastra tus archivos aquí</h3>
                            <p class="text-slate-500 dark:text-slate-400 mb-6">o haz clic para seleccionar de tu dispositivo</p>
                            <button id="select-files-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-xl transition-colors shadow-sm">Seleccionar Archivos</button>
                            <p class="text-xs text-slate-400 mt-4">Formatos soportados: ${tool.accept}</p>
                        </div>

                        ${state.files.length > 0 ? `
                        <div class="mt-8">
                            <h4 class="font-semibold text-slate-700 dark:text-slate-300 mb-4">Archivos listos para procesar:</h4>
                            <ul class="space-y-3 mb-6">
                                ${state.files.map((file, idx) => `
                                <li class="flex items-center justify-between bg-slate-50 dark:bg-slate-800 p-3 rounded-xl border border-slate-100 dark:border-slate-700">
                                    <div class="flex items-center gap-3 overflow-hidden">
                                        <!-- Miniaturas fotográficas rotativas -->
                                        ${state.filePreviews[idx] 
                                            ? `<div class="w-12 h-12 flex-shrink-0 bg-slate-200 dark:bg-slate-700 rounded overflow-hidden flex items-center justify-center border border-slate-300 dark:border-slate-600"><img src="${state.filePreviews[idx]}" class="max-w-full max-h-full object-contain" style="transform: rotate(${state.fileRotations[idx] || 0}deg); transition: transform 0.3s ease;" /></div>`
                                            : `<div class="w-12 h-12 flex-shrink-0 flex items-center justify-center transition-transform duration-300" style="transform: rotate(${state.fileRotations[idx] || 0}deg);"><i data-lucide="${(file.type === 'application/pdf' || file.name.endsWith('.pdf')) ? 'loader-2' : 'file-text'}" class="${(file.type === 'application/pdf' || file.name.endsWith('.pdf')) ? 'animate-spin text-blue-500' : 'text-slate-400'} w-6 h-6"></i></div>`
                                        }
                                        <div class="flex flex-col overflow-hidden">
                                            <span class="font-medium text-slate-700 dark:text-slate-200 truncate">${file.name}</span>
                                            <span class="text-xs text-slate-500">(${(file.size / 1024 / 1024).toFixed(2)} MB)</span>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-1">
                                        ${(state.filePreviews[idx] || file.type === 'application/pdf' || file.name.endsWith('.pdf')) ? `
                                        <button data-rotate="${idx}" class="rotate-file-btn text-blue-500 hover:text-blue-600 p-2 bg-blue-50 dark:bg-blue-900/30 rounded-lg hover:bg-blue-100" title="Girar 90°"><i data-lucide="rotate-cw" class="w-5 h-5 pointer-events-none"></i></button>
                                        ` : ''}
                                        <button data-index="${idx}" class="remove-file-btn text-slate-400 hover:text-red-500 p-2 hover:bg-red-50 rounded-lg" title="Eliminar"><i data-lucide="x" class="w-5 h-5 pointer-events-none"></i></button>
                                    </div>
                                </li>
                                `).join('')}
                            </ul>

                            ${tool.id === 'from-pdf' ? `
                            <div class="mt-6 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Convertir a:</label>
                                <select id="export-format" class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-lg p-2.5">
                                    <option value="docx" ${state.selectedExportFormat === 'docx' ? 'selected' : ''}>Microsoft Word (.docx)</option>
                                    <option value="xlsx" ${state.selectedExportFormat === 'xlsx' ? 'selected' : ''}>Microsoft Excel (.xlsx)</option>
                                    <option value="jpg" ${state.selectedExportFormat === 'jpg' ? 'selected' : ''}>Imagen JPEG (.jpg)</option>
                                    <option value="png" ${state.selectedExportFormat === 'png' ? 'selected' : ''}>Imagen PNG (.png)</option>
                                </select>
                            </div>` : ''}

                            ${tool.id === 'split' ? `
                            <div class="mt-6 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Rango de páginas a extraer (ej. 1, 3, 5-8):</label>
                                <input type="text" id="split-range" value="${state.splitRange}" placeholder="Ej: 1, 3, 5-8" class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-lg p-2.5">
                            </div>` : ''}
                            
                            ${tool.id === 'delete' ? `
                            <div class="mt-6 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Páginas a eliminar (ej. 2, 4-6):</label>
                                <input type="text" id="delete-range" value="${state.deleteRange}" placeholder="Ej: 2, 4-6" class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-lg p-2.5">
                            </div>` : ''}
                            
                            ${tool.id === 'compress' ? `
                            <div class="mt-6 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Nivel de compresión:</label>
                                <select id="compression-level" class="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-lg p-2.5">
                                    <option value="25" ${state.compressionLevel === '25' ? 'selected' : ''}>25% - Calidad Excelente</option>
                                    <option value="50" ${state.compressionLevel === '50' ? 'selected' : ''}>50% - Calidad Media</option>
                                    <option value="75" ${state.compressionLevel === '75' ? 'selected' : ''}>75% - Calidad Básica</option>
                                </select>
                            </div>` : ''}

                            <div class="mt-6 flex justify-end border-t border-slate-100 dark:border-slate-700 pt-6">
                                <button id="process-btn" class="bg-slate-900 dark:bg-blue-600 hover:bg-slate-800 text-white font-bold py-3 px-8 rounded-xl flex items-center gap-2 shadow-md">
                                    Procesar Ahora <i data-lucide="arrow-right-left" class="w-5 h-5 pointer-events-none"></i>

        // --- STREAMING_CHUNK: Event Delegation ---
        function attachListeners() {
            const addEvt = (id, type, handler) => { const el = document.getElementById(id); if(el) el.addEventListener(type, handler); };
            
            addEvt('theme-toggle', 'click', () => { document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); render(); });
            addEvt('nav-logo', 'click', () => { state.activeTool = null; resetWorkspace(); });
            addEvt('back-btn', 'click', () => { state.activeTool = null; resetWorkspace(); });
            addEvt('open-terms-btn', 'click', () => { state.isTermsModalOpen = true; render(); document.body.style.overflow = 'hidden'; });
            
            const closeModal = () => { state.isTermsModalOpen = false; render(); document.body.style.overflow = 'auto'; };
            addEvt('close-terms-btn', 'click', closeModal);
            addEvt('close-terms-x', 'click', closeModal);
            const overlay = document.getElementById('terms-modal-overlay');
            if(overlay) overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };

            addEvt('subscribe-form', 'submit', (e) => {
                e.preventDefault();
                state.subscriptionEmail = document.getElementById('subscriber-email').value;
                state.subscriptionStatus = 'subscribing'; render();
                fetch("https://script.google.com/macros/s/AKfycbzFcQubKPubo319RkUJDeqelQxqjVZ3p2wttrc-hjdP-Rh2V8rTxG0NIgIaQiEgPr11TA/exec", { method: 'POST', mode: 'no-cors', body: new URLSearchParams({ 'email': state.subscriptionEmail }) })
                .then(() => { state.subscriptionStatus = 'success'; state.subscriptionEmail = ''; render(); })
                .catch(() => { state.subscriptionStatus = 'idle'; render(); });
            });

            if (!state.activeTool) {
                document.querySelectorAll('.tool-card').forEach(c => c.onclick = () => { state.activeTool = TOOLS.find(t => t.id === c.dataset.id); resetWorkspace(); });
            } else {
                const dz = document.getElementById('dropzone');
                if (dz) {
                    dz.ondragover = (e) => { e.preventDefault(); state.isDragging = true; render(); };
                    dz.ondragleave = (e) => { e.preventDefault(); state.isDragging = false; render(); };
                    dz.ondrop = (e) => { e.preventDefault(); state.isDragging = false; if (e.dataTransfer.files.length) handleFiles(Array.from(e.dataTransfer.files)); };
                }
                addEvt('select-files-btn', 'click', () => document.getElementById('file-input').click());
                addEvt('file-input', 'change', (e) => { if (e.target.files.length) handleFiles(Array.from(e.target.files)); });
                
                addEvt('export-format', 'change', (e) => state.selectedExportFormat = e.target.value);
                addEvt('split-range', 'input', (e) => state.splitRange = e.target.value);
                addEvt('delete-range', 'input', (e) => state.deleteRange = e.target.value);
                addEvt('compression-level', 'change', (e) => state.compressionLevel = e.target.value);
                
                addEvt('process-btn', 'click', processFiles);
                addEvt('reset-btn', 'click', resetWorkspace);
                addEvt('reset-btn-err', 'click', resetWorkspace);
                
                document.querySelectorAll('.remove-file-btn').forEach(btn => btn.onclick = (e) => {
                    const idx = parseInt(e.currentTarget.dataset.index);
                    state.files.splice(idx, 1); state.filePreviews.splice(idx, 1); state.fileRotations.splice(idx, 1); render();
                });
                
                document.querySelectorAll('.rotate-file-btn').forEach(btn => btn.onclick = (e) => {
                    const idx = parseInt(e.currentTarget.dataset.rotate);
                    state.fileRotations[idx] = ((state.fileRotations[idx] || 0) + 90) % 360; render();
                });
            }
        }

        // --- STREAMING_CHUNK: Handlers & Previews ---
        function handleFiles(newFiles) {
            const MAX_SIZE = 101 * 1024 * 1024; // 101 MB limite
            const validFiles = [];

            for (let file of newFiles) {
                if (file.size > MAX_SIZE) {
                    showToast(`El archivo "${file.name}" supera el límite de 101 MB.`, 'error');
                } else {
                    validFiles.push(file);
                }
            }

            if (validFiles.length === 0) return;

            let startIdx = 0;
            if (state.activeTool.multiple) { 
                startIdx = state.files.length; 
                state.files = [...state.files, ...validFiles]; 
            } else { 
                state.files = [validFiles[0]]; 
                state.filePreviews = []; 
                state.fileRotations = []; 
            }
            
            for (let i = 0; i < validFiles.length; i++) {
                const targetIdx = startIdx + i;
                state.fileRotations[targetIdx] = 0;
                generatePreview(validFiles[i], targetIdx);
            }
            render();
        }

        async function generatePreview(file, index) {
            if (file.type.startsWith('image/')) {
                state.filePreviews[index] = URL.createObjectURL(file); render();
            } else if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    const page = await pdfDoc.getPage(1);
                    const viewport = page.getViewport({ scale: 0.5 }); 
                    const canvas = document.createElement('canvas');
                    canvas.width = viewport.width; canvas.height = viewport.height;
                    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                    state.filePreviews[index] = canvas.toDataURL('image/jpeg', 0.8);
                    render();
                } catch (e) { state.filePreviews[index] = ''; render(); }
            }
        }

        function resetWorkspace() {
            state.files = []; state.filePreviews = []; state.fileRotations = [];
            state.processingState = 'idle'; state.downloadUrl = null; state.progress = 0; render();
        }

        function createDownload(data, filename, type) {
            const blob = new Blob([data], { type: type });
            state.downloadUrl = URL.createObjectURL(blob);
            state.downloadName = filename;
            state.processingState = 'done';
            render();
        }

        function parsePageRange(rangeStr, maxPages) {
            const indices = new Set();
            if (!rangeStr.trim()) return [];
            const parts = rangeStr.split(',');
            for (let part of parts) {
                part = part.trim();
                if (part.includes('-')) {
                    const [s, e] = part.split('-');
                    let start = parseInt(s), end = parseInt(e);
                    if (!isNaN(start) && !isNaN(end)) {
                        start = Math.max(1, start); end = Math.min(maxPages, end);
                        for (let i = start; i <= end; i++) indices.add(i - 1);
                    }
                } else {
                    const num = parseInt(part);
                    if (!isNaN(num) && num >= 1 && num <= maxPages) indices.add(num - 1);
                }
            }
            return Array.from(indices).sort((a, b) => a - b);
        }

        // --- STREAMING_CHUNK: Processing Logic ---
        async function processFiles() {
            if (!state.files.length) return;
            state.progress = 0; state.processingState = 'processing'; render();
            try {
                if (state.activeTool.id === 'merge') await processMerge();
                else if (state.activeTool.id === 'split') await processSplit();
                else if (state.activeTool.id === 'compress') await processCompress();
                else if (state.activeTool.id === 'to-pdf') await processCreatePdf();
                else if (state.activeTool.id === 'from-pdf') await processFromPdf();
                else if (state.activeTool.id === 'delete') await processDelete();
                else if (state.activeTool.id === 'number') await processNumberPages();
            } catch (error) {
                state.errorMessage = 'El archivo tiene un error o está protegido con contraseña.';
                state.processingState = 'error'; render();
            }
        }

        async function processMerge() {
            const { PDFDocument, degrees } = window.PDFLib;
            const mergedPdf = await PDFDocument.create();
            for (let i = 0; i < state.files.length; i++) {
                const file = state.files[i]; const angle = state.fileRotations[i] || 0;
                if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
                    const pdf = await PDFDocument.load(await file.arrayBuffer());
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    copiedPages.forEach((page) => {
                        if (angle !== 0) page.setRotation(degrees((page.getRotation().angle + angle) % 360));
                        mergedPdf.addPage(page);
                    });
                } else if (file.type.startsWith('image/')) {
                    let image = file.type.includes('png') ? await mergedPdf.embedPng(await file.arrayBuffer()) : await mergedPdf.embedJpg(await file.arrayBuffer());
                    let pWidth = (angle === 90 || angle === 270) ? image.height : image.width;
                    let pHeight = (angle === 90 || angle === 270) ? image.width : image.height;
                    const page = mergedPdf.addPage([pWidth, pHeight]);
                    if (angle === 0) page.drawImage(image, { x: 0, y: 0, width: image.width, height: image.height });
                    else if (angle === 90) page.drawImage(image, { x: pWidth, y: 0, width: image.width, height: image.height, rotate: degrees(90) });
                    else if (angle === 180) page.drawImage(image, { x: pWidth, y: pHeight, width: image.width, height: image.height, rotate: degrees(180) });
                    else if (angle === 270) page.drawImage(image, { x: 0, y: pHeight, width: image.width, height: image.height, rotate: degrees(270) });
                }
                updateProgress(Math.round(((i+1) / state.files.length) * 100));
                await yieldThread();
            }
            createDownload(await mergedPdf.save(), 'Unido.pdf', 'application/pdf');
        }

        async function processSplit() {
            const { PDFDocument } = window.PDFLib;
            const originalPdf = await PDFDocument.load(await state.files[0].arrayBuffer());
            let pagesToExtract = parsePageRange(state.splitRange, originalPdf.getPageCount());
            if (!pagesToExtract.length) pagesToExtract = [0]; // Por defecto extrae la primera
            
            if (pagesToExtract.length === 1) {
                const newPdf = await PDFDocument.create();
                newPdf.addPage((await newPdf.copyPages(originalPdf, [pagesToExtract[0]]))[0]);
                updateProgress(100);
                createDownload(await newPdf.save(), `Pagina_${pagesToExtract[0] + 1}.pdf`, 'application/pdf');
            } else {
                const zip = new JSZip();
                for (let i=0; i<pagesToExtract.length; i++) {
                    const singlePdf = await PDFDocument.create();
                    singlePdf.addPage((await singlePdf.copyPages(originalPdf, [pagesToExtract[i]]))[0]);
                    zip.file(`Pagina_${pagesToExtract[i] + 1}.pdf`, await singlePdf.save());
                    updateProgress(Math.round(((i+1)/pagesToExtract.length)*100));
                    await yieldThread();
                }
                createDownload(await zip.generateAsync({type:"blob"}), 'Separadas.zip', 'application/zip');
            }
        }

        async function processDelete() {
            const { PDFDocument } = window.PDFLib;
            const originalPdf = await PDFDocument.load(await state.files[0].arrayBuffer());
            const totalPages = originalPdf.getPageCount();
            const pagesToDelete = parsePageRange(state.deleteRange, totalPages);
            const pagesToKeep = [];
            for (let i = 0; i < totalPages; i++) { if (!pagesToDelete.includes(i)) pagesToKeep.push(i); }
            if (pagesToKeep.length === 0) throw new Error("No puedes eliminar todas las páginas del PDF.");
            
            const newPdf = await PDFDocument.create();
            const copiedPages = await newPdf.copyPages(originalPdf, pagesToKeep);
            copiedPages.forEach(p => newPdf.addPage(p));
            updateProgress(100);
            createDownload(await newPdf.save(), `Editado_${state.files[0].name}`, 'application/pdf');
        }

        async function processNumberPages() {
            const { PDFDocument, StandardFonts, rgb } = window.PDFLib;
            const pdfDoc = await PDFDocument.load(await state.files[0].arrayBuffer());
            const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
            const pages = pdfDoc.getPages();
            
            for (let i = 0; i < pages.length; i++) {
                const page = pages[i]; const { width } = page.getSize();
                const text = `${i + 1}`; const textWidth = font.widthOfTextAtSize(text, 12);
                page.drawText(text, { x: width / 2 - textWidth / 2, y: 20, size: 12, font, color: rgb(0, 0, 0) });
                if (i % 5 === 0) { updateProgress(Math.round(((i+1) / pages.length) * 100)); await yieldThread(); }
            }
            updateProgress(100);
            createDownload(await pdfDoc.save(), `Numerado_${state.files[0].name}`, 'application/pdf');
        }

        async function processCompress() {
            const file = state.files[0]; const level = parseInt(state.compressionLevel);
            const pdfDoc = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
            const { PDFDocument } = window.PDFLib; const newPdf = await PDFDocument.create();
            let imgQuality = level === 25 ? 0.8 : (level === 75 ? 0.3 : 0.5);

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 }); 
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                
                const newImg = await newPdf.embedJpg(canvas.toDataURL('image/jpeg', imgQuality));
                newPdf.addPage([newImg.width, newImg.height]).drawImage(newImg, { x: 0, y: 0, width: newImg.width, height: newImg.height });
                
                canvas.width = 0; canvas.height = 0; // Liberar RAM
                updateProgress(Math.round((i / pdfDoc.numPages) * 100));
                await yieldThread();
            }
            createDownload(await newPdf.save(), `Comprimido_${file.name}`, 'application/pdf');
        }

        async function processCreatePdf() {
            const { PDFDocument, StandardFonts, rgb, degrees } = window.PDFLib;
            const newPdf = await PDFDocument.create();

            for (let i = 0; i < state.files.length; i++) {
                const file = state.files[i]; const angle = state.fileRotations[i] || 0;
                const ext = file.name.split('.').pop().toLowerCase();
                const arrBuf = await file.arrayBuffer();

                if (ext === 'txt') {
                    const lines = new TextDecoder("utf-8").decode(arrBuf).split('\n');
                    const font = await newPdf.embedFont(StandardFonts.Helvetica);
                    let page = newPdf.addPage(); let { height } = page.getSize(); let y = height - 50;
                    for (const line of lines) {
                        if (y < 50) { page = newPdf.addPage(); y = height - 50; }
                        try { page.drawText(line.replace(/\r/g,''), { x: 50, y, size: 12, font, color: rgb(0,0,0) }); } catch(e){}
                        y -= 15;
                    }
                } else if (['jpg', 'jpeg', 'png'].includes(ext)) {
                    let img = ext === 'png' ? await newPdf.embedPng(arrBuf) : await newPdf.embedJpg(arrBuf);
                    let w = (angle===90||angle===270) ? img.height : img.width, h = (angle===90||angle===270) ? img.width : img.height;
                    const page = newPdf.addPage([w, h]);
                    if (angle===0) page.drawImage(img, { x:0, y:0, width:img.width, height:img.height });
                    else if (angle===90) page.drawImage(img, { x:w, y:0, width:img.width, height:img.height, rotate: degrees(90) });
                    else if (angle===180) page.drawImage(img, { x:w, y:h, width:img.width, height:img.height, rotate: degrees(180) });
                    else if (angle===270) page.drawImage(img, { x:0, y:h, width:img.width, height:img.height, rotate: degrees(270) });
                }
                updateProgress(Math.round(((i+1) / state.files.length) * 100));
                await yieldThread();
            }
            createDownload(await newPdf.save(), 'Creado.pdf', 'application/pdf');
        }

        async function processFromPdf() {
            const file = state.files[0]; const format = state.selectedExportFormat;
            const pdfDoc = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;

            if (format === 'jpg' || format === 'png') {
                const page = await pdfDoc.getPage(1); const viewport = page.getViewport({ scale: 2.0 }); 
                const canvas = document.createElement('canvas'); canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                const mime = format === 'png' ? 'image/png' : 'image/jpeg';
                updateProgress(100);
                createDownload(await (await fetch(canvas.toDataURL(mime, 1.0))).arrayBuffer(), `Imagen.${format}`, mime);
            } else {
                let html = "", excel = "";
                for (let i = 1; i <= pdfDoc.numPages; i++) {
                    const text = (await (await pdfDoc.getPage(i)).getTextContent()).items.map(t => t.str).join(' ');
                    html += `<p>${text}</p>`; excel += `<tr><td><b>Página ${i}</b></td><td>${text}</td></tr>`;
                    updateProgress(Math.round((i / pdfDoc.numPages) * 100));
                    await yieldThread();
                }
                const content = format === 'docx' 
                    ? `<html xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"></head><body>${html}</body></html>`
                    : `<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"></head><body><table border="1">${excel}</table></body></html>`;
                createDownload(content, `Convertido.${format === 'docx' ? 'doc' : 'xls'}`, format === 'docx' ? 'application/msword' : 'application/vnd.ms-excel');
            }
        }

        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
